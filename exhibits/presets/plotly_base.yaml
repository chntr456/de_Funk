# Plotly Base Configuration
# Shared settings for all Plotly-based exhibits (line_chart, bar_chart, scatter_chart)
# Extends: _base/exhibit.yaml
# Version: 1.0

extends: _base/exhibit.yaml

# Override base defaults for Plotly charts
defaults:
  height: 400
  interactive: true

# Plotly-specific layout configuration
layout:
  # Margins
  margin:
    left: 40
    right: 40
    top: 30
    bottom: 40

  # Legend
  legend:
    orientation: "h"       # h=horizontal, v=vertical
    y_anchor: "bottom"
    y: 1.02
    x_anchor: "right"
    x: 1
    background_color: null  # Use theme default
    border_color: null
    border_width: 1

  # Hover mode
  hover_mode: "x unified"  # x, y, closest, x unified, y unified

  # Grid
  show_grid: true
  gridwidth: 1

  # Axis styling
  axis:
    show_line: true
    line_width: 1
    zero_line: false
    automargin: true

  # Template
  template: "plotly_white"

# Mode bar configuration
mode_bar:
  display: true
  display_logo: false
  buttons_to_remove:
    - lasso2d
    - select2d
  to_image_options:
    format: "png"
    height: 600
    width: 1200
    scale: 2

# Animation settings
animation:
  enabled: false
  duration: 500
  easing: "cubic-in-out"

# Plotly theme overrides (extends base themes)
themes:
  light:
    # Inherits from _base/exhibit.yaml light theme
    template: "plotly_white"
    colorway:
      - "#636EFA"  # Blue
      - "#EF553B"  # Red
      - "#00CC96"  # Green
      - "#AB63FA"  # Purple
      - "#FFA15A"  # Orange
      - "#19D3F3"  # Cyan
      - "#FF6692"  # Pink
      - "#B6E880"  # Light green
      - "#FF97FF"  # Magenta
      - "#FECB52"  # Yellow

  dark:
    # Inherits from _base/exhibit.yaml dark theme
    template: "plotly_dark"
    colorway:
      - "#636EFA"
      - "#EF553B"
      - "#00CC96"
      - "#AB63FA"
      - "#FFA15A"
      - "#19D3F3"
      - "#FF6692"
      - "#B6E880"
      - "#FF97FF"
      - "#FECB52"

# Common trace styling
trace_defaults:
  # Line settings
  line:
    width: 2
    shape: "linear"  # linear, spline, hv, vh, hvh, vhv

  # Marker settings
  marker:
    size: 3
    opacity: 0.8

  # Fill settings
  fill: "none"  # none, tozeroy, tozerox, tonexty, tonextx, toself

# Responsive configuration
responsive:
  enabled: true
  maintain_aspect_ratio: false

# Locale for number/date formatting
locale:
  number_format:
    thousands_separator: ","
    decimal_separator: "."
  date_format: "%Y-%m-%d"
  datetime_format: "%Y-%m-%d %H:%M"
