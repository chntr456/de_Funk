# City Finance Model - Municipal financial and economic data
# Modular structure following v2.0 conventions

model: city_finance
version: 2.0
description: "City of Chicago financial and economic data"
tags: [municipal, chicago, city, finance, budget]

# Dependencies on other models
depends_on:
  - core   # Uses shared dim_calendar for time-based queries
  - macro  # Compare local vs national indicators

# Component composition
components:
  schema: city_finance/schema.yaml
  graph: city_finance/graph.yaml
  measures: city_finance/measures.yaml

# Storage configuration
storage:
  root: storage/silver/city_finance
  format: delta

# Build configuration
build:
  partitions: [date]
  sort_by: [community_area, date]
  optimize: true

# Metadata
metadata:
  owner: data_engineering
  domain: municipal
  data_sources:
    - chicago_data_portal
