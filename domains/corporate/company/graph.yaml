# Company graph definition
#
# v2.2: Updated to read from securities_reference (bulk listing)
# No longer requires CIK (bulk LISTING_STATUS doesn't provide it)
# Financial statements link via ticker directly
#
# CIK-based linking is optional - when available, it enables company-level
# reporting even when tickers change. Without CIK, we use ticker-based joins.

nodes:
  # ===========================================================================
  # DIMENSIONS
  # ===========================================================================
  dim_company:
    from: bronze.securities_reference
    filters:
      # Only include active stocks (not ETFs, options, etc.)
      # LISTING_STATUS returns 'Stock', OVERVIEW returns 'Common Stock'
      - "type IN ('Stock', 'Common Stock', 'Preferred Stock')"
      - "is_active = true"
    select:
      cik: cik  # May be NULL from bulk listing, populated from OVERVIEW calls
      company_name: security_name
      legal_name: security_name
      ticker_primary: ticker
      ticker: ticker  # Primary key for filter compatibility
      exchange_code: exchange_code
      is_active: is_active
      sector: sector           # May be NULL from bulk listing
      industry: industry       # May be NULL from bulk listing
      market_cap: market_cap   # May be NULL from bulk listing
      shares_outstanding: shares_outstanding  # May be NULL from bulk listing
      pe_ratio: pe_ratio       # May be NULL from bulk listing
      eps: eps                 # May be NULL from bulk listing
      dividend_yield: dividend_yield  # May be NULL from bulk listing
    derive:
      # Use ticker as company_id since CIK may not be available
      company_id: "CONCAT('COMPANY_', COALESCE(cik, ticker))"
      incorporation_country: "'US'"
    tags: [dim, entity, corporate]
    unique_key: [ticker]  # Use ticker as primary key (works with bulk listing)

  # ===========================================================================
  # FACT TABLES - Financial Statements
  # ===========================================================================
  # Note: Facts are read directly from bronze without lookup join.
  # The ticker filter from notebook will be applied at query time.
  # This avoids the expensive join during silver build.

  # Income Statement Facts
  fact_income_statement:
    from: bronze.company_income_statements
    select:
      # Map camelCase bronze columns to snake_case silver columns
      ticker: ticker
      fiscal_date_ending: fiscalDateEnding
      report_type: report_type
      # Revenue & Profit
      total_revenue: totalRevenue
      cost_of_revenue: costOfRevenue
      gross_profit: grossProfit
      operating_income: operatingIncome
      net_income: netIncome
      ebit: ebit
      ebitda: ebitda
      # Expenses
      operating_expenses: operatingExpenses
      sg_and_a: sellingGeneralAndAdministrative
      research_and_development: researchAndDevelopment
      interest_expense: interestExpense
      income_tax_expense: incomeTaxExpense
      # Metadata
      reported_currency: reportedCurrency
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscalDateEnding"
    tags: [fact, financials, income_statement]
    unique_key: [ticker, fiscal_date_ending, report_type]

  # Balance Sheet Facts
  fact_balance_sheet:
    from: bronze.company_balance_sheets
    select:
      # Map camelCase bronze columns to snake_case silver columns
      ticker: ticker
      fiscal_date_ending: fiscalDateEnding
      report_type: report_type
      # Assets
      total_assets: totalAssets
      total_current_assets: totalCurrentAssets
      cash_and_equivalents: cashAndCashEquivalentsAtCarryingValue
      inventory: inventory
      current_net_receivables: currentNetReceivables
      total_non_current_assets: totalNonCurrentAssets
      property_plant_equipment: propertyPlantEquipment
      goodwill: goodwill
      intangible_assets: intangibleAssets
      # Liabilities
      total_liabilities: totalLiabilities
      total_current_liabilities: totalCurrentLiabilities
      accounts_payable: accountsPayable
      long_term_debt: longTermDebt
      short_term_debt: shortTermDebt
      # Equity
      total_shareholder_equity: totalShareholderEquity
      retained_earnings: retainedEarnings
      common_stock: commonStock
      common_stock_shares_outstanding: commonStockSharesOutstanding
      # Metadata
      reported_currency: reportedCurrency
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscalDateEnding"
      total_debt: "COALESCE(shortTermDebt, 0) + COALESCE(longTermDebt, 0)"
    tags: [fact, financials, balance_sheet]
    unique_key: [ticker, fiscal_date_ending, report_type]

  # Cash Flow Facts
  fact_cash_flow:
    from: bronze.company_cash_flows
    select:
      # Map camelCase bronze columns to snake_case silver columns
      ticker: ticker
      fiscal_date_ending: fiscalDateEnding
      report_type: report_type
      # Operating
      operating_cashflow: operatingCashflow
      depreciation_depletion_amortization: depreciationDepletionAndAmortization
      change_in_receivables: changeInReceivables
      change_in_inventory: changeInInventory
      profit_loss: profitLoss
      # Investing
      cashflow_from_investment: cashflowFromInvestment
      capital_expenditures: capitalExpenditures
      # Financing
      cashflow_from_financing: cashflowFromFinancing
      dividend_payout: dividendPayout
      dividend_payout_common: dividendPayoutCommonStock
      proceeds_from_stock_repurchase: proceedsFromRepurchaseOfEquity
      proceeds_from_stock_issuance: proceedsFromIssuanceOfCommonStock
      # Summary
      net_change_in_cash: changeInCashAndCashEquivalents
      # Metadata
      reported_currency: reportedCurrency
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscalDateEnding"
      # Free cash flow = operating - capex
      free_cash_flow: "operatingCashflow - ABS(COALESCE(capitalExpenditures, 0))"
    tags: [fact, financials, cash_flow]
    unique_key: [ticker, fiscal_date_ending, report_type]

  # Earnings Facts (EPS actual vs estimate)
  fact_earnings:
    from: bronze.company_earnings
    select:
      # Map camelCase bronze columns to snake_case silver columns
      ticker: ticker
      fiscal_date_ending: fiscalDateEnding
      report_type: report_type
      reported_eps: reportedEPS
      estimated_eps: estimatedEPS
      surprise: surprise
      surprise_percentage: surprisePercentage
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscalDateEnding"
    tags: [fact, financials, earnings]
    unique_key: [ticker, fiscal_date_ending, report_type]

edges:
  # Cross-model edge to stocks for ticker-based filtering
  company_to_stock:
    from: dim_company
    to: stocks.dim_stock
    "on": ["ticker=ticker"]
    type: one_to_one
    description: "Company's primary stock listing - enables ticker filter to apply to stock prices"

  # Link financial statements to company dimension via ticker
  # (CIK-based linking not available from bulk listing)
  income_statement_to_company:
    from: fact_income_statement
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link income statements to company via ticker"

  balance_sheet_to_company:
    from: fact_balance_sheet
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link balance sheets to company via ticker"

  cash_flow_to_company:
    from: fact_cash_flow
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link cash flows to company via ticker"

  earnings_to_company:
    from: fact_earnings
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link earnings to company via ticker"

  # Link to calendar for time-series analysis
  income_statement_to_calendar:
    from: fact_income_statement
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link income statements to calendar"

  balance_sheet_to_calendar:
    from: fact_balance_sheet
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link balance sheets to calendar"

  cash_flow_to_calendar:
    from: fact_cash_flow
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link cash flows to calendar"

  earnings_to_calendar:
    from: fact_earnings
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link earnings to calendar"
