# Macro Schema - Dimensions and Facts
# BLS economic indicator structures

dimensions:
  dim_economic_series:
    path: dims/dim_economic_series
    description: "Economic indicator series metadata"
    columns:
      series_id: string
      series_name: string
      category: string
      frequency: string
      units: string
      seasonal_adjustment: string
    primary_key: [series_id]
    tags: [dim, reference, series]

facts:
  fact_unemployment:
    path: facts/fact_unemployment
    description: "National unemployment rate (monthly)"
    columns:
      series_id: string
      date: date
      year: integer
      period: string
      value: double
      period_name: string
    partitions: [year]
    tags: [fact, unemployment, monthly]

  fact_cpi:
    path: facts/fact_cpi
    description: "Consumer Price Index (monthly)"
    columns:
      series_id: string
      date: date
      year: integer
      period: string
      value: double
      period_name: string
    partitions: [year]
    tags: [fact, cpi, inflation, monthly]

  fact_employment:
    path: facts/fact_employment
    description: "Total nonfarm employment (monthly)"
    columns:
      series_id: string
      date: date
      year: integer
      period: string
      value: double
      period_name: string
    partitions: [year]
    tags: [fact, employment, monthly]

  fact_wages:
    path: facts/fact_wages
    description: "Average hourly earnings (monthly)"
    columns:
      series_id: string
      date: date
      year: integer
      period: string
      value: double
      period_name: string
    partitions: [year]
    tags: [fact, wages, monthly]
