# Options measures - extends base securities measures

extends: _base.securities.measures

simple_measures:
  avg_implied_vol:
    description: "Average implied volatility"
    type: simple
    source: fact_option_greeks.implied_volatility
    aggregation: avg
    format: "#,##0.00%"
    tags: [volatility, options]

  total_open_interest:
    description: "Total open interest"
    type: simple
    source: fact_option_prices.open_interest
    aggregation: sum
    format: "#,##0"
    tags: [volume, options]

python_measures:
  black_scholes_price:
    description: "Black-Scholes theoretical price"
    function: "options.measures.calculate_black_scholes"

  put_call_ratio:
    description: "Put/Call ratio by volume"
    function: "options.measures.calculate_put_call_ratio"
