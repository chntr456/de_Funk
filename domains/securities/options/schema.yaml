# Options schema - extends base securities schema

extends: _base.securities.schema

dimensions:
  dim_option:
    extends: _base.securities._dim_security
    description: "Options contract dimension"
    columns:
      # Inherited: ticker, security_name, asset_type, etc.

      # Options-specific fields:
      underlying_ticker:
        type: string
        description: "FK to stocks.dim_stock.ticker"
        required: true

      strike_price:
        type: double
        description: "Strike/exercise price"
        required: true

      expiry_date:
        type: date
        description: "Expiration date"
        required: true

      option_type:
        type: string
        description: "call or put"
        enum: [call, put]
        required: true

      contract_size:
        type: int
        description: "Shares per contract (usually 100)"
        default: 100

      option_style:
        type: string
        description: "american or european"
        enum: [american, european]
        default: american

    primary_key: [ticker]
    tags: [dim, option, derivative]

facts:
  fact_option_prices:
    extends: _base.securities._fact_prices
    description: "Daily option prices"
    columns:
      # Inherited OHLCV fields

      # Options-specific price fields:
      underlying_price:
        type: double
        description: "Price of underlying stock"

      intrinsic_value:
        type: double
        description: "Intrinsic value (Max(0, S-K) for calls)"

      time_value:
        type: double
        description: "Time premium (price - intrinsic)"

      bid:
        type: double

      ask:
        type: double

      bid_ask_spread:
        type: double

      open_interest:
        type: long
        description: "Contracts outstanding"

  fact_option_greeks:
    description: "Options Greeks and implied volatility"
    columns:
      ticker:
        type: string
        required: true

      trade_date:
        type: date
        required: true

      delta:
        type: double
        description: "Rate of change in price wrt underlying"

      gamma:
        type: double
        description: "Rate of change of delta"

      theta:
        type: double
        description: "Time decay (usually negative)"

      vega:
        type: double
        description: "Sensitivity to volatility"

      rho:
        type: double
        description: "Sensitivity to interest rates"

      implied_volatility:
        type: double
        description: "Implied volatility from option price"

    primary_key: [ticker, trade_date]
    partitions: [trade_date]
    tags: [fact, greeks, derivatives]
