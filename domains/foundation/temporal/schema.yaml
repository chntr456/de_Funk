# Core Schema - Foundation dimension tables
# Version: 2.0

# Dimension tables
dimensions:
  dim_calendar:
    path: dims/dim_calendar
    description: "Universal calendar dimension with rich date attributes"
    columns:
      date: date                    # Primary key: YYYY-MM-DD
      year: integer                 # Calendar year (2020, 2021, etc.)
      quarter: integer              # Calendar quarter (1-4)
      month: integer                # Month number (1-12)
      month_name: string            # Month name (January, February, etc.)
      month_abbr: string            # Month abbreviation (Jan, Feb, etc.)
      week_of_year: integer         # ISO week number (1-53)
      day_of_month: integer         # Day of month (1-31)
      day_of_week: integer          # Day of week (1=Monday, 7=Sunday)
      day_of_week_name: string      # Day name (Monday, Tuesday, etc.)
      day_of_week_abbr: string      # Day abbreviation (Mon, Tue, etc.)
      day_of_year: integer          # Day of year (1-366)
      is_weekend: boolean           # True if Saturday or Sunday
      is_weekday: boolean           # True if Monday-Friday
      is_month_start: boolean       # First day of month
      is_month_end: boolean         # Last day of month
      is_quarter_start: boolean     # First day of quarter
      is_quarter_end: boolean       # Last day of quarter
      is_year_start: boolean        # First day of year
      is_year_end: boolean          # Last day of year
      fiscal_year: integer          # Fiscal year (configurable)
      fiscal_quarter: integer       # Fiscal quarter (1-4)
      fiscal_month: integer         # Fiscal month (1-12)
      days_in_month: integer        # Number of days in the month
      year_month: string            # YYYY-MM format
      year_quarter: string          # YYYY-Q1, YYYY-Q2, etc.
      date_str: string              # YYYY-MM-DD as string
    primary_key: [date]
    tags: [dim, calendar, time, shared]

