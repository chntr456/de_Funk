# Base measures for all securities
# Simple aggregations only - complex logic goes in measures.py

simple_measures:
  avg_close_price:
    description: "Average closing price"
    type: simple
    source: fact_prices.close
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, average]

  total_volume:
    description: "Total trading volume"
    type: simple
    source: fact_prices.volume
    aggregation: sum
    data_type: double
    format: "#,##0"
    tags: [volume, total]

  max_high:
    description: "Highest price in period"
    type: simple
    source: fact_prices.high
    aggregation: max
    data_type: double
    format: "$#,##0.00"
    tags: [price, max]

  min_low:
    description: "Lowest price in period"
    type: simple
    source: fact_prices.low
    aggregation: min
    data_type: double
    format: "$#,##0.00"
    tags: [price, min]

  avg_vwap:
    description: "Average volume weighted average price"
    type: simple
    source: fact_prices.volume_weighted
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, vwap]

  avg_daily_transactions:
    description: "Average number of daily transactions"
    type: simple
    source: fact_prices.transactions
    aggregation: avg
    data_type: double
    format: "#,##0"
    tags: [activity, transactions]

computed_measures:
  price_range:
    description: "Daily price range (high - low)"
    type: computed
    expression: "high - low"
    source_table: fact_prices
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, volatility]

  intraday_return:
    description: "Intraday return percentage"
    type: computed
    expression: "(close - open) / NULLIF(open, 0) * 100"
    source_table: fact_prices
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [return, intraday]

  range_pct:
    description: "Price range as percentage of close"
    type: computed
    expression: "(high - low) / NULLIF(close, 0) * 100"
    source_table: fact_prices
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [volatility, percentage]

# Complex measures delegated to Python
# Child models can add python_measures section that references functions
python_measures: {}
