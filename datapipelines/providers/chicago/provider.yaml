# Chicago Data Portal Provider Configuration
# Auto-discovered by ProviderRegistry

name: chicago
version: "1.0"
description: "Municipal data from Chicago Data Portal - finance, property, and community data via Socrata API"

# Models this provider feeds data to
models:
  - city_finance
  - chicago_actuarial  # Future model for actuarial analysis

# Bronze tables this provider writes to
bronze_tables:
  - chicago_budget
  - chicago_employees
  - chicago_contracts
  - chicago_tax_assessment  # Future table
  - chicago_community_areas  # Future table

# API configuration key (maps to configs/pipelines/{config_key}_endpoints.json)
config_key: chicago

# Rate limiting (Socrata API)
rate_limit: 1000     # requests per hour (with token)
daily_limit: null    # No daily limit with token
# Note: Without token, throttled more aggressively

# Ingestor class configuration
module_path: datapipelines.providers.chicago
class_name: ChicagoIngestor

# Tags for filtering/grouping
tags:
  - municipal
  - chicago
  - government
  - budget
  - finance
  - property

# Provider status
enabled: true

# Additional metadata
metadata:
  api_docs: "https://data.cityofchicago.org"
  data_quality: official
  historical_depth: "varies by dataset, some back to 2000s"
  update_frequency: varies
  api_type: socrata
  key_datasets:
    - budget-annual-appropriations  # Annual budget data
    - current-employee-names-salaries  # Employee salaries
    - contracts  # City contracts
    - jcxq-k9xf  # Property Tax Assessments (future)
    - igwz-8jzy  # Community Area boundaries (future)
