# Line Chart Preset Configuration
# Time series and categorical line charts with interactive features
# Extends: presets/plotly_base.yaml
# Version: 1.0

extends: presets/plotly_base.yaml

# Line chart specific description
description: "Interactive line charts for time series and categorical data"

# Override defaults for line charts
defaults:
  height: 400
  interactive: true

# Line chart specific settings
line_chart:
  # Mode: lines, markers, lines+markers
  mode: "lines+markers"

  # Line styling
  line:
    width: 2
    shape: "linear"    # linear, spline, hv, vh, hvh, vhv
    dash: "solid"      # solid, dot, dash, longdash, dashdot, longdashdot
    smoothing: 1.3     # Spline smoothing (0-1.3)

  # Marker styling
  marker:
    size: 3
    symbol: "circle"   # circle, square, diamond, cross, x, etc.
    opacity: 0.8
    show: true

  # Fill options
  fill: "none"         # none, tozeroy, tozerox, tonexty
  fill_color: null     # Auto-derived from line color with opacity

  # Connect gaps in data
  connect_gaps: true

  # Data ordering
  sort_by_x: true      # Sort data points by x-axis value

# X-axis configuration
x_axis:
  title: null          # Auto-derived from dimension name
  type: "auto"         # auto, linear, log, date, category
  tick_angle: 0        # Rotation angle for tick labels
  tick_format: null    # Auto format based on type
  range_slider:
    enabled: false     # Show range slider below chart
    thickness: 0.1
  range_selector:
    enabled: false     # Show range buttons (1M, 6M, YTD, 1Y, All)
    buttons:
      - label: "1M"
        step: "month"
        count: 1
      - label: "6M"
        step: "month"
        count: 6
      - label: "YTD"
        step: "year"
        count: 1
        step_mode: "todate"
      - label: "1Y"
        step: "year"
        count: 1
      - label: "All"
        step: "all"

# Y-axis configuration
y_axis:
  title: null          # Auto-derived from measure name
  type: "linear"       # linear, log
  tick_format: null    # Auto format based on data
  range_mode: "normal" # normal, tozero, nonnegative
  secondary:
    enabled: false     # Enable secondary y-axis
    title: null
    side: "right"

# Legend settings (override base)
legend:
  show: true
  group_click: "toggleitem"  # toggleitem, togglegroup

# Hover settings
hover:
  mode: "x unified"
  label_format: null   # Auto format based on measure
  value_format: ".2f"  # Number format for values

# Performance limits
performance:
  max_points_per_line: 500    # Downsample if exceeded
  max_dimension_values: 10    # Limit legend items
  downsample_method: "lttb"   # lttb (Largest-Triangle-Three-Buckets), none

# Selector defaults for line charts
selectors:
  measure_selector:
    enabled: true
    multiselect: true
    show_all_option: true
    format_func: "title_case"  # title_case, snake_to_title, none

  dimension_selector:
    enabled: true
    aggregation: "mean"
    format_func: "title_case"

# Annotations
annotations:
  enabled: false
  # Example annotation config:
  # items:
  #   - x: "2024-01-01"
  #     text: "Event Label"
  #     arrow: true
