# Bar Chart Preset Configuration
# Categorical bar charts with grouping and stacking options
# Extends: presets/plotly_base.yaml
# Version: 1.0

extends: presets/plotly_base.yaml

# Bar chart specific description
description: "Interactive bar charts for categorical data comparison"

# Override defaults for bar charts
defaults:
  height: 350
  interactive: true

# Bar chart specific settings
bar_chart:
  # Orientation: v (vertical), h (horizontal)
  orientation: "v"

  # Bar mode: group, stack, overlay, relative
  bar_mode: "group"

  # Bar styling
  bar:
    width: null        # Auto width based on data
    gap: 0.2           # Gap between bars (0-1)
    group_gap: 0.1     # Gap between bar groups (0-1)
    opacity: 0.9
    line_width: 0      # Bar outline width
    line_color: null   # Bar outline color

  # Text on bars
  text:
    show: false        # Show values on bars
    position: "auto"   # auto, inside, outside, none
    font_size: 10
    format: ".2f"      # Number format

  # Sorting
  sort_bars: false     # Sort by value
  sort_order: "descending"  # ascending, descending

# X-axis configuration (categories for vertical bars)
x_axis:
  title: null
  type: "category"
  tick_angle: 0
  category_order: "trace"  # trace, category ascending, category descending, total ascending, total descending

# Y-axis configuration (values for vertical bars)
y_axis:
  title: null
  type: "linear"
  tick_format: null
  range_mode: "tozero"  # Force y-axis to start at zero

# Legend settings
legend:
  show: true
  item_click: "toggle"      # toggle, toggleothers
  item_doubleclick: "toggleothers"

# Hover settings
hover:
  mode: "closest"
  label_format: null
  value_format: ",.2f"

# Color settings
colors:
  # Use colorway from theme by default
  use_theme_colorway: true
  # Or specify custom colors per category
  category_colors: {}   # {"Category A": "#FF0000", "Category B": "#00FF00"}

# Selector defaults for bar charts
selectors:
  measure_selector:
    enabled: true
    multiselect: false  # Single measure for bar charts usually
    show_all_option: false
    format_func: "title_case"

  dimension_selector:
    enabled: true
    aggregation: "sum"  # Sum is typical for bar charts
    format_func: "title_case"

# Data labels (alternative to text on bars)
data_labels:
  enabled: false
  position: "top"      # top, bottom, left, right
  offset: 5            # Pixels from bar
  format: ",.0f"

# Reference lines
reference_lines:
  # Example:
  # - value: 100
  #   label: "Target"
  #   color: "#FF0000"
  #   dash: "dash"
  items: []

# Annotations
annotations:
  enabled: false
  items: []
