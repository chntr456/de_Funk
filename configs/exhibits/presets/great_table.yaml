# Great Tables Preset Configuration
# Default parameters for Great Tables exhibits

defaults:
  # Theme
  theme: default  # default, financial, dark, striped, minimal

  # Title/Subtitle
  title: null
  subtitle: null

  # Row configuration
  row_striping: true
  row_dividers: false

  # Column configuration defaults
  column_labels: {}  # {column_id: "Display Label"}
  column_formats: {}  # {column_id: format_spec}
  column_widths: {}  # {column_id: "150px"}

  # Spanners (grouped headers)
  # Can be "auto" to inherit from model schema, or list of spanner configs
  spanners: null

  # Conditional formatting
  formatting_rules: []

  # Footer
  footnotes: []
  source_note: null

  # Export options
  export_html: false
  export_png: false

# Available format specifications
format_specs:
  currency: "$#,##0.00"
  currency_millions: "${:,.0f}M"
  currency_billions: "${:,.1f}B"
  percent: "0.0%"
  number: "#,##0.00"
  integer: "#,##0"
  date: "%Y-%m-%d"
  datetime: "%Y-%m-%d %H:%M"

# Theme configurations
themes:
  default:
    style: 1
    row_striping: true

  financial:
    style: 2
    row_striping: true
    font_family: "Georgia, serif"
    header_font_family: "Arial, sans-serif"

  dark:
    style: 6
    row_striping: false

  striped:
    style: 1
    row_striping: true

  minimal:
    style: 1
    row_striping: false
