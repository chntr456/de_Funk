version: "1.0"

notebook:
  id: stock_analysis
  title: "Stock Performance Analysis"
  description: "Analyzing stock prices with volume metrics"
  author: analyst@company.com
  created: "2024-01-01"
  updated: "2024-01-15"
  tags: [stocks, prices, analysis]

# Graph defines the data subgraph for this notebook
graph:
  models:
    - name: company
      config: configs/models/company.yaml
      nodes:
        - dim_company
        - dim_exchange
        - fact_prices
        - prices_with_company

# Variables define reusable parameters and filters
variables:
  # Time is the default notebook variable
  time:
    type: date_range
    default:
      start: "2024-01-01"
      end: "2024-01-05"
    display_name: "Date Range"
    description: "Primary time filter for all exhibits"

  tickers:
    type: multi_select
    default: ["AAPL", "GOOGL", "MSFT"]
    display_name: "Stock Tickers"
    description: "Select stocks to analyze"

  min_volume:
    type: number
    default: 0
    display_name: "Minimum Volume"

# Exhibits define visualizations and interactions
# All dimensions and measures come from the model - no duplication!
exhibits:
  - id: price_overview
    type: metric_cards
    title: "Price Overview"
    description: "Key price metrics for selected period"
    source: company.prices_with_company
    filters:
      time: $time
      tickers: $tickers
    metrics:
      - measure: avg_close_price
      - measure: total_volume
      - measure: max_high
      - measure: min_low
    layout:
      columns: 4

  - id: price_trend
    type: line_chart
    title: "Daily Closing Prices"
    description: "Price trends over time"
    source: company.prices_with_company
    filters:
      time: $time
      tickers: $tickers
    x_axis:
      dimension: trade_date
      label: "Date"
    y_axis:
      measures:
        - avg_close_price
      label: "Price ($)"
    color_by: ticker
    legend: true
    interactive: true

  - id: volume_comparison
    type: bar_chart
    title: "Trading Volume by Stock"
    description: "Total volume comparison"
    source: company.prices_with_company
    filters:
      time: $time
      tickers: $tickers
    x_axis:
      dimension: ticker
      label: "Stock"
    y_axis:
      measures:
        - total_volume
      label: "Volume"
    color_by: ticker

  - id: detailed_prices
    type: data_table
    title: "Detailed Price Data"
    source: company.prices_with_company
    filters:
      time: $time
      tickers: $tickers
    columns:
      - trade_date
      - ticker
      - company_name
      - close
      - volume
      - high
      - low
    pagination: true
    page_size: 50
    download: true
    sortable: true

# Layout defines how exhibits are arranged
layout:
  - section:
      title: "Summary Metrics"
      exhibits:
        - price_overview

  - section:
      title: "Trend Analysis"
      exhibits:
        - price_trend
        - volume_comparison
      columns: 2

  - section:
      title: "Detailed Data"
      exhibits:
        - detailed_prices
