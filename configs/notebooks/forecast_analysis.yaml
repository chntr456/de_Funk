version: "1.0"

notebook:
  id: forecast_analysis
  title: "Time Series Forecast Analysis"
  description: "Stock price and volume forecasts with multiple models and accuracy metrics"
  author: analyst@company.com
  created: "2024-01-01"
  updated: "2024-01-15"
  tags: [forecast, timeseries, ml, predictions]

# Variables for filtering forecast data
variables:
  ticker:
    type: multi_select
    default: ["AAPL"]
    options: ["AAPL", "GOOGL", "MSFT", "AMZN", "META", "NVDA", "TSLA"]
    display_name: "Stock Tickers"
    description: "Select stocks to view forecasts"

  model_name:
    type: multi_select
    default: ["ARIMA_30d", "Prophet_30d"]
    options: ["ARIMA_7d", "ARIMA_14d", "ARIMA_30d", "ARIMA_60d", "Prophet_7d", "Prophet_30d", "Prophet_60d", "RandomForest_14d", "RandomForest_30d"]
    display_name: "Models"
    description: "Select forecast models to compare"

# Note: forecast_date filtering removed to avoid column mismatch errors
# - forecast_price/forecast_volume tables use 'forecast_date' column
# - forecast_metrics table uses 'metric_date' column
# Date filtering is handled within individual exhibit components

# Exhibits for displaying forecasts
exhibits:
  - id: forecast_overview
    type: metric_cards
    title: "Forecast Model Overview"
    description: "Summary of forecast accuracy across models"
    source: "forecast.forecast_metrics"
    metrics:
      - measure: mae
        label: "Avg MAE"
        aggregation: avg
      - measure: rmse
        label: "Avg RMSE"
        aggregation: avg
      - measure: mape
        label: "Avg MAPE (%)"
        aggregation: avg
      - measure: r2_score
        label: "Avg R²"
        aggregation: avg

  - id: price_forecast
    type: forecast_chart
    title: "Price Forecast with Confidence Intervals"
    description: "Predicted closing prices with 95% confidence intervals"
    target: price
    source: "forecast.forecast_price"

  - id: volume_forecast
    type: forecast_chart
    title: "Volume Forecast with Confidence Intervals"
    description: "Predicted trading volumes with 95% confidence intervals"
    target: volume
    source: "forecast.forecast_volume"

  - id: model_accuracy
    type: forecast_metrics_table
    title: "Model Accuracy Metrics"
    description: "Detailed accuracy metrics for all forecast models"
    source: "forecast.forecast_metrics"

  - id: price_forecast_data
    type: data_table
    title: "Price Forecast Data"
    description: "Detailed price forecast data"
    source: "forecast.forecast_price"
    download: true

  - id: volume_forecast_data
    type: data_table
    title: "Volume Forecast Data"
    description: "Detailed volume forecast data"
    source: "forecast.forecast_volume"
    download: true

# Layout
layout:
  - title: "Forecast Summary"
    exhibits: [forecast_overview]
    columns: 1

  - title: "Price & Volume Forecasts"
    exhibits: [price_forecast, volume_forecast]
    columns: 1

  - title: "Model Performance"
    exhibits: [model_accuracy]
    columns: 1

  - title: "Detailed Data"
    exhibits: [price_forecast_data, volume_forecast_data]
    columns: 2
