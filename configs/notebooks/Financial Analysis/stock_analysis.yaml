version: "1.0"

notebook:
  id: stock_analysis
  title: "Stock Performance Analysis"
  description: "Analyzing stock prices with volume metrics"
  author: analyst@company.com
  created: "2024-01-01"
  updated: "2024-01-15"
  tags: [stocks, prices, analysis]

# Variables define reusable notebook-level filters
# These map directly to table column names for DuckDB filtering
variables:
  trade_date:
    type: date_range
    default:
      start: "2024-01-01"
      end: "2024-01-05"
    display_name: "Date Range"
    description: "Filter by trade date range"

  ticker:
    type: multi_select
    default: []
    source:
      model: "company"
      node: "fact_prices"
      column: "ticker"
    display_name: "Stock Tickers"
    description: "Select stocks to analyze (loaded from database)"

  volume:
    type: number
    default: 0
    display_name: "Minimum Volume"
    description: "Filter by minimum trading volume"

# Exhibits define visualizations
# Each exhibit specifies:
# - source: "model.table" format to query from
# - Columns directly from the source table
# - Filters applied via notebook variables (mapped to column names)
exhibits:
  - id: price_overview
    type: metric_cards
    title: "Price Overview"
    description: "Key price metrics for selected period"
    source: "company.fact_prices"
    metrics:
      - measure: close
        label: "Avg Close"
        aggregation: avg
      - measure: volume
        label: "Total Volume"
        aggregation: sum
      - measure: high
        label: "Max High"
        aggregation: max
      - measure: low
        label: "Min Low"
        aggregation: min

  - id: price_trend
    type: line_chart
    title: "Daily Closing Prices"
    description: "Price trends over time"
    source: "company.fact_prices"
    x_axis:
      dimension: trade_date
      label: "Date"
    y_axis:
      measure: close
      label: "Price ($)"
    color_by: ticker

  - id: volume_comparison
    type: bar_chart
    title: "Trading Volume by Stock"
    description: "Total volume comparison"
    source: "company.fact_prices"
    x_axis:
      dimension: ticker
      label: "Stock"
    y_axis:
      measure: volume
      label: "Volume"
    color_by: ticker

  - id: detailed_prices
    type: data_table
    title: "Detailed Price Data"
    description: "All columns from prices table"
    source: "company.fact_prices"
    download: true

# Layout defines how exhibits are arranged on the page
layout:
  - title: "Summary Metrics"
    exhibits: [price_overview]
    columns: 1

  - title: "Trend Analysis"
    exhibits: [price_trend, volume_comparison]
    columns: 2

  - title: "Detailed Data"
    exhibits: [detailed_prices]
    columns: 1
