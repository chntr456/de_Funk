# Folder Filter Context for Root Notebooks
# Provides default filter values for stock, company, sector, and forecast analysis notebooks

filters:
  # Default tickers for multi-select notebooks
  ticker:
    - AAPL
    - MSFT
    - GOOGL

  # Date range for price and forecast analysis
  trade_date:
    start: "2024-01-01"
    end: "2025-12-31"

  # Forecast date range
  forecast_date:
    start: "2025-01-01"
    end: "2025-12-31"

  # Fiscal period for company financials
  fiscal_date:
    start: "2020-01-01"
    end: "2025-12-31"

  # Report type default
  report_type: "annual"

  # Forecast horizon default (days)
  horizon: 7

metadata:
  created: "2025-12-05T00:00:00"
  last_updated: "2025-12-05T00:00:00"
  folder: "notebooks"
  description: "v2.0 notebooks for stock, company, sector, and forecast analysis"
