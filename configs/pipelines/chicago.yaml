# Chicago Data Portal Pipeline Configuration
# Combines endpoint definitions with pipeline-specific settings
#
# Author: de_Funk Team
# Date: December 2025

provider: chicago
description: "Municipal data from Chicago Data Portal (Socrata API)"
version: "2.0"

# =============================================================================
# API CONFIGURATION
# =============================================================================

api:
  base_url: "https://data.cityofchicago.org"
  credentials:
    env_var: "CHICAGO_API_KEYS"
    header: "X-App-Token"
    comment: "App token is optional but recommended for higher rate limits"
  rate_limit:
    calls_per_second: 5.0
    comment: "Without token: 1000 req/day. With token: higher limits apply"

# =============================================================================
# PIPELINE SETTINGS
# =============================================================================

pipeline:
  batch_size: 5
  batch_write_size: 5
  max_retries: 3
  retry_delay_seconds: 1.0
  strategy: "horizontal"  # Chicago is by dataset, not per-entity
  pagination:
    type: "offset"
    limit: 1000

# =============================================================================
# DATA TYPES - Datasets to ingest
# =============================================================================

data_types:
  building_permits:
    description: "Building permits issued by the City of Chicago"
    endpoint: "building_permits"
    facet: "BuildingPermitsFacet"
    bronze_table: "building_permits"
    enabled: true

  business_licenses:
    description: "Active business licenses in Chicago"
    endpoint: "business_licenses"
    facet: "BusinessLicensesFacet"
    bronze_table: "business_licenses"
    enabled: true

  unemployment_rates:
    description: "Monthly unemployment rates by Chicago community area"
    endpoint: "unemployment_rates"
    facet: "UnemploymentRatesFacet"
    bronze_table: "unemployment_rates"
    enabled: true

  per_capita_income:
    description: "Per capita income by Chicago community area"
    endpoint: "per_capita_income"
    facet: "PerCapitaIncomeFacet"
    bronze_table: "per_capita_income"
    enabled: true

  economic_indicators:
    description: "Chicago economic indicators time series"
    endpoint: "economic_indicators"
    facet: "EconomicIndicatorsFacet"
    bronze_table: "economic_indicators"
    enabled: true

  affordable_rental_housing:
    description: "Affordable rental housing developments"
    endpoint: "affordable_rental_housing"
    facet: "AffordableHousingFacet"
    bronze_table: "affordable_rental_housing"
    enabled: true

# =============================================================================
# ENDPOINTS - Socrata API endpoints
# =============================================================================

endpoints:
  building_permits:
    method: "GET"
    path: "/resource/ydr8-5enu.json"
    default_params:
      $limit: 1000
      $order: "issue_date DESC"
    pagination: "offset"
    comment: "Building permits issued by the City of Chicago"

  business_licenses:
    method: "GET"
    path: "/resource/r5kz-chrr.json"
    default_params:
      $limit: 1000
      $order: "license_start_date DESC"
    pagination: "offset"
    comment: "Active business licenses in Chicago"

  unemployment_rates:
    method: "GET"
    path: "/resource/ane4-dwhs.json"
    default_params:
      $limit: 1000
      $order: "date DESC"
    pagination: "offset"
    comment: "Monthly unemployment rates by Chicago community area"

  per_capita_income:
    method: "GET"
    path: "/resource/qpxx-qyaw.json"
    default_params:
      $limit: 1000
      $order: "community_area_number"
    pagination: "offset"
    comment: "Per capita income by Chicago community area"

  economic_indicators:
    method: "GET"
    path: "/resource/nej5-8p3s.json"
    default_params:
      $limit: 1000
      $order: "date DESC"
    pagination: "offset"
    comment: "Chicago economic indicators time series"

  affordable_rental_housing:
    method: "GET"
    path: "/resource/s6ha-ppgi.json"
    default_params:
      $limit: 1000
      $order: "property_name"
    pagination: "offset"
    comment: "Affordable rental housing developments"

# =============================================================================
# PROGRESS DISPLAY SETTINGS
# =============================================================================

progress:
  show_batch_header: true
  show_dataset_status: true
  show_eta: true
  data_type_short_names:
    building_permits: "bld"
    business_licenses: "biz"
    unemployment_rates: "uem"
    per_capita_income: "inc"
    economic_indicators: "eco"
    affordable_rental_housing: "hsg"

# =============================================================================
# NOTES
# =============================================================================

notes:
  api_documentation: "https://dev.socrata.com/foundry/data.cityofchicago.org"
  pagination: "Socrata uses $offset and $limit parameters for pagination"
  authentication: "App token is optional but recommended for higher rate limits"
