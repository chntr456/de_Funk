# Macro Model - Macroeconomic indicators
# Modular structure following v2.0 conventions

model: macro
version: 2.0
description: "Macroeconomic indicators from BLS (Bureau of Labor Statistics)"
tags: [macro, economics, bls, timeseries]

# Dependencies on other models
depends_on:
  - core  # Uses shared dim_calendar for time-based queries

# Component composition
components:
  schema: macro/schema.yaml
  graph: macro/graph.yaml
  measures: macro/measures.yaml

# Storage configuration
storage:
  root: storage/silver/macro
  format: delta

# Build configuration
build:
  partitions: [year]
  sort_by: [series_id, date]
  optimize: true

# Metadata
metadata:
  owner: data_engineering
  domain: economics
  data_sources:
    - bureau_of_labor_statistics
