# Company measures

simple_measures:
  company_count:
    description: "Total number of companies"
    type: simple
    source: dim_company.company_id
    aggregation: count
    data_type: long
    format: "#,##0"
    tags: [count, corporate]

  active_company_count:
    description: "Number of active companies"
    type: simple
    source: dim_company.company_id
    aggregation: count
    filters:
      - "is_active = true"
    data_type: long
    format: "#,##0"
    tags: [count, active]

  companies_by_sector:
    description: "Company count by sector"
    type: simple
    source: dim_company.company_id
    aggregation: count
    group_by: [sector]
    data_type: long
    format: "#,##0"
    tags: [count, sector]

  companies_by_state:
    description: "Company count by incorporation state"
    type: simple
    source: dim_company.company_id
    aggregation: count
    group_by: [incorporation_state]
    data_type: long
    format: "#,##0"
    tags: [count, incorporation]

