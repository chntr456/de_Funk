# Company graph definition

nodes:
  dim_company:
    from: bronze.securities_reference
    filters:
      - "asset_type = 'stocks'"  # Only stock tickers have company data
      # Note: CIK filter removed - Alpha Vantage doesn't provide CIK
    select:
      cik: cik  # Will be NULL for Alpha Vantage data
      company_name: security_name  # Bronze column is security_name, not name
      legal_name: security_name    # Will be updated when we get proper SEC data
      ticker_primary: ticker
      sic_code: sic_code
      sic_description: sic_description
      exchange_code: primary_exchange
      is_active: is_active  # Already boolean in bronze
      sector: sector
      industry: industry
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      incorporation_country: "'US'"  # Default, update from SEC data later
    tags: [dim, entity, corporate]
    unique_key: [ticker_primary]  # Changed from [cik] since CIK can be NULL

