# Company graph definition
#
# v2.2: Updated to read from securities_reference (bulk listing)
# No longer requires CIK (bulk LISTING_STATUS doesn't provide it)
# Financial statements link via ticker directly
#
# CIK-based linking is optional - when available, it enables company-level
# reporting even when tickers change. Without CIK, we use ticker-based joins.

nodes:
  # ===========================================================================
  # DIMENSIONS
  # ===========================================================================
  dim_company:
    from: bronze.securities_reference
    filters:
      # Only include active stocks (not ETFs, options, etc.)
      # LISTING_STATUS returns 'Stock', OVERVIEW returns 'Common Stock'
      - "type IN ('Stock', 'Common Stock')"
      - "is_active = true"
    select:
      cik: cik  # May be NULL from bulk listing, populated from OVERVIEW calls
      company_name: security_name
      legal_name: security_name
      ticker_primary: ticker
      ticker: ticker  # Primary key for filter compatibility
      exchange_code: exchange_code
      is_active: is_active
      sector: sector           # May be NULL from bulk listing
      industry: industry       # May be NULL from bulk listing
      market_cap: market_cap   # May be NULL from bulk listing
      shares_outstanding: shares_outstanding  # May be NULL from bulk listing
      pe_ratio: pe_ratio       # May be NULL from bulk listing
      eps: eps                 # May be NULL from bulk listing
      dividend_yield: dividend_yield  # May be NULL from bulk listing
    derive:
      # Use ticker as company_id since CIK may not be available
      company_id: "CONCAT('COMPANY_', COALESCE(cik, ticker))"
      incorporation_country: "'US'"
    tags: [dim, entity, corporate]
    unique_key: [ticker]  # Use ticker as primary key (works with bulk listing)

  # ===========================================================================
  # FACT TABLES - Financial Statements
  # ===========================================================================
  # Note: Facts are read directly from bronze without lookup join.
  # The ticker filter from notebook will be applied at query time.
  # This avoids the expensive join during silver build.

  # Income Statement Facts
  fact_income_statement:
    from: bronze.income_statements
    select:
      ticker: ticker
      fiscal_date_ending: fiscal_date_ending
      report_type: report_type
      # Revenue & Profit
      total_revenue: total_revenue
      cost_of_revenue: cost_of_revenue
      gross_profit: gross_profit
      operating_income: operating_income
      net_income: net_income
      ebit: ebit
      ebitda: ebitda
      # Expenses
      operating_expenses: operating_expenses
      sg_and_a: sg_and_a
      research_and_development: research_and_development
      interest_expense: interest_expense
      income_tax_expense: income_tax_expense
      # Metadata
      reported_currency: reported_currency
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscal_date_ending"
    tags: [fact, financials, income_statement]
    unique_key: [ticker, fiscal_date_ending, report_type]

  # Balance Sheet Facts
  fact_balance_sheet:
    from: bronze.balance_sheets
    select:
      ticker: ticker
      fiscal_date_ending: fiscal_date_ending
      report_type: report_type
      # Assets
      total_assets: total_assets
      total_current_assets: total_current_assets
      cash_and_equivalents: cash_and_equivalents
      inventory: inventory
      current_net_receivables: current_net_receivables
      total_non_current_assets: total_non_current_assets
      property_plant_equipment: property_plant_equipment
      goodwill: goodwill
      intangible_assets: intangible_assets
      # Liabilities
      total_liabilities: total_liabilities
      total_current_liabilities: total_current_liabilities
      accounts_payable: accounts_payable
      long_term_debt: long_term_debt
      short_term_debt: short_term_debt
      # Equity
      total_shareholder_equity: total_shareholder_equity
      retained_earnings: retained_earnings
      common_stock: common_stock
      common_stock_shares_outstanding: shares_outstanding
      # Metadata
      reported_currency: reported_currency
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscal_date_ending"
      total_debt: "COALESCE(short_term_debt, 0) + COALESCE(long_term_debt, 0)"
    tags: [fact, financials, balance_sheet]
    unique_key: [ticker, fiscal_date_ending, report_type]

  # Cash Flow Facts
  fact_cash_flow:
    from: bronze.cash_flows
    select:
      ticker: ticker
      fiscal_date_ending: fiscal_date_ending
      report_type: report_type
      # Operating
      operating_cashflow: operating_cashflow
      depreciation_depletion_amortization: depreciation_depletion_amortization
      change_in_receivables: change_in_receivables
      change_in_inventory: change_in_inventory
      profit_loss: profit_loss
      # Investing
      cashflow_from_investment: cashflow_from_investment
      capital_expenditures: capital_expenditures
      # Financing
      cashflow_from_financing: cashflow_from_financing
      dividend_payout: dividend_payout
      dividend_payout_common: dividend_payout_common
      proceeds_from_stock_repurchase: proceeds_from_stock_repurchase
      proceeds_from_stock_issuance: proceeds_from_stock_issuance
      # Summary
      net_change_in_cash: net_change_in_cash
      free_cash_flow: free_cash_flow
      # Metadata
      reported_currency: reported_currency
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscal_date_ending"
    tags: [fact, financials, cash_flow]
    unique_key: [ticker, fiscal_date_ending, report_type]

  # Earnings Facts (EPS actual vs estimate)
  fact_earnings:
    from: bronze.earnings
    select:
      ticker: ticker
      fiscal_date_ending: fiscal_date_ending
      report_type: report_type
      reported_eps: reported_eps
      estimated_eps: estimated_eps
      surprise: surprise
      surprise_percentage: surprise_percentage
    derive:
      company_id: "CONCAT('COMPANY_', ticker)"
      report_date: "fiscal_date_ending"
    tags: [fact, financials, earnings]
    unique_key: [ticker, fiscal_date_ending, report_type]

edges:
  # Cross-model edge to stocks for ticker-based filtering
  company_to_stock:
    from: dim_company
    to: stocks.dim_stock
    "on": ["ticker=ticker"]
    type: one_to_one
    description: "Company's primary stock listing - enables ticker filter to apply to stock prices"

  # Link financial statements to company dimension via ticker
  # (CIK-based linking not available from bulk listing)
  income_statement_to_company:
    from: fact_income_statement
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link income statements to company via ticker"

  balance_sheet_to_company:
    from: fact_balance_sheet
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link balance sheets to company via ticker"

  cash_flow_to_company:
    from: fact_cash_flow
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link cash flows to company via ticker"

  earnings_to_company:
    from: fact_earnings
    to: dim_company
    "on": ["ticker=ticker"]
    type: left
    description: "Link earnings to company via ticker"

  # Link to calendar for time-series analysis
  income_statement_to_calendar:
    from: fact_income_statement
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link income statements to calendar"

  balance_sheet_to_calendar:
    from: fact_balance_sheet
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link balance sheets to calendar"

  cash_flow_to_calendar:
    from: fact_cash_flow
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link cash flows to calendar"

  earnings_to_calendar:
    from: fact_earnings
    to: temporal.dim_calendar
    "on": ["report_date=date"]
    type: left
    description: "Link earnings to calendar"
