version: 1
model: city_finance
tags: [municipal, chicago, city, finance, budget]
description: "City of Chicago financial and economic data"

# Dependencies on other models
depends_on:
  - macro  # Compare local vs national indicators

# Storage configuration
storage:
  root: storage/silver/city_finance
  format: parquet

# Schema definitions
schema:
  dimensions:
    dim_community_area:
      path: dims/dim_community_area
      description: "Chicago community areas (77 total)"
      columns:
        community_area: string
        community_name: string
        geography_type: string
      primary_key: [community_area]
      tags: [dim, geography, chicago]

    dim_permit_type:
      path: dims/dim_permit_type
      description: "Building permit types"
      columns:
        permit_type: string
        permit_category: string
      primary_key: [permit_type]
      tags: [dim, reference, permits]

  facts:
    fact_local_unemployment:
      path: facts/fact_local_unemployment
      description: "Unemployment by Chicago community area (monthly)"
      columns:
        geography: string
        geography_type: string
        date: date
        unemployment_rate: double
        labor_force: long
        employed: long
        unemployed: long
      partitions: [date]
      tags: [fact, unemployment, community, monthly]

    fact_building_permits:
      path: facts/fact_building_permits
      description: "Building permits issued in Chicago"
      columns:
        permit_number: string
        permit_type: string
        issue_date: date
        total_fee: double
        contractor_name: string
        work_description: string
        community_area: string
        latitude: double
        longitude: double
      partitions: [issue_date]
      tags: [fact, permits, construction, event]

    fact_business_licenses:
      path: facts/fact_business_licenses
      description: "Active business licenses in Chicago"
      columns:
        license_id: string
        business_name: string
        license_type: string
        start_date: date
        community_area: string
      partitions: [start_date]
      tags: [fact, business, licenses]

    fact_economic_indicators:
      path: facts/fact_economic_indicators
      description: "City-level economic indicators"
      columns:
        indicator_name: string
        date: date
        value: double
        community_area: string
      partitions: [date]
      tags: [fact, economics, city]

    unemployment_with_area:
      path: facts/unemployment_with_area
      description: "Local unemployment with community area details"
      columns:
        date: date
        geography: string
        community_name: string
        unemployment_rate: double
        labor_force: long
        employed: long
        unemployed: long
      partitions: [date]
      tags: [fact, analytics, materialized]

    permits_with_area:
      path: facts/permits_with_area
      description: "Building permits with community area context"
      columns:
        issue_date: date
        permit_number: string
        permit_type: string
        total_fee: double
        contractor_name: string
        community_area: string
        community_name: string
        latitude: double
        longitude: double
      partitions: [issue_date]
      tags: [fact, analytics, materialized]

# Available measures
measures:
  avg_local_unemployment:
    description: "Average community area unemployment rate"
    source: fact_local_unemployment.unemployment_rate
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [unemployment, average, local]

  total_permits_issued:
    description: "Total building permits issued"
    source: fact_building_permits.permit_number
    aggregation: count
    data_type: long
    format: "#,##0"
    tags: [permits, count]

  total_permit_fees:
    description: "Total permit fees collected"
    source: fact_building_permits.total_fee
    aggregation: sum
    data_type: double
    format: "$#,##0.00"
    tags: [permits, fees, revenue]

  avg_permit_fee:
    description: "Average permit fee"
    source: fact_building_permits.total_fee
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [permits, fees, average]

  total_labor_force:
    description: "Total labor force across communities"
    source: fact_local_unemployment.labor_force
    aggregation: sum
    data_type: long
    format: "#,##0"
    tags: [employment, labor_force]

# Graph structure
graph:
  nodes:
    - id: dim_community_area
      from: bronze.chicago_unemployment
      select:
        geography: geography
        community_name: geography
        geography_type: geography_type
      derive:
        community_area: geography
      tags: [dim, geography]
      unique_key: [community_area]

    - id: dim_permit_type
      from: bronze.chicago_building_permits
      select:
        permit_type: permit_type
      derive:
        permit_category: "general"
      tags: [dim, permits]
      unique_key: [permit_type]

    - id: fact_local_unemployment
      from: bronze.chicago_unemployment
      select:
        geography: geography
        geography_type: geography_type
        date: date
        unemployment_rate: unemployment_rate
        labor_force: labor_force
        employed: employed
        unemployed: unemployed
      tags: [fact, unemployment]

    - id: fact_building_permits
      from: bronze.chicago_building_permits
      select:
        permit_number: id
        permit_type: permit_type
        issue_date: issue_date
        total_fee: total_fee
        contractor_name: contractor_1_name
        work_description: work_description
        community_area: community_area
        latitude: latitude
        longitude: longitude
      tags: [fact, permits]

  edges:
    - from: fact_local_unemployment
      to: dim_community_area
      on: ["geography=community_area"]
      type: many_to_one
      description: "Unemployment data by community area"

    - from: fact_building_permits
      to: dim_community_area
      on: ["community_area=community_area"]
      type: many_to_one
      description: "Permits issued in community area"

    - from: fact_building_permits
      to: dim_permit_type
      on: ["permit_type=permit_type"]
      type: many_to_one
      description: "Permits by type"

  paths:
    - id: unemployment_with_area
      hops: "fact_local_unemployment -> dim_community_area"
      description: "Unemployment with full community area context"
      tags: [analytics, unemployment]

    - id: permits_with_area
      hops: "fact_building_permits -> dim_community_area"
      description: "Permits with community area details"
      tags: [analytics, permits]

# Chicago Data Sources
data_sources:
  unemployment:
    dataset_id: "ane4-dwhs"
    name: "Chicago Unemployment Rates by Community Area"
    frequency: monthly
    granularity: community_area

  building_permits:
    dataset_id: "ydr8-5enu"
    name: "Building Permits"
    frequency: event
    granularity: permit

  business_licenses:
    dataset_id: "r5kz-chrr"
    name: "Business Licenses"
    frequency: event
    granularity: license

  economic_indicators:
    dataset_id: "nej5-8p3s"
    name: "Economic Indicators"
    frequency: monthly
    granularity: city
