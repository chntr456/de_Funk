# Futures Model - Futures contracts
# Inherits from securities base class

model: futures
version: 2.0
description: "Futures contracts with expiry and margin tracking"
tags: [futures, derivatives, commodities, indices]

# Model inheritance and dependencies
inherits_from: _base.securities
depends_on: [temporal]               # Futures are standalone

# Component composition
components:
  schema: futures/schema.yaml
  graph: futures/graph.yaml
  measures:
    yaml: futures/measures.yaml
    python: futures/measures.py      # Roll calculations, basis, etc.

# Storage configuration
storage:
  root: storage/silver/futures
  format: delta

# Build configuration
build:
  partitions: [trade_date]
  sort_by: [contract_type, expiry_date, trade_date]
  optimize: true

# Metadata
metadata:
  owner: data_engineering
  domain: derivatives
  sla_hours: 4
