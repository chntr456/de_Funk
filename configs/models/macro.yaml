version: 1
model: macro
tags: [macro, economics, bls, timeseries]
description: "Macroeconomic indicators from BLS (Bureau of Labor Statistics)"

# Storage configuration
storage:
  root: storage/silver/macro
  format: parquet

# Schema definitions
schema:
  dimensions:
    dim_economic_series:
      path: dims/dim_economic_series
      description: "Economic indicator series metadata"
      columns:
        series_id: string
        series_name: string
        category: string
        frequency: string
        units: string
        seasonal_adjustment: string
      primary_key: [series_id]
      tags: [dim, reference, series]

  facts:
    fact_unemployment:
      path: facts/fact_unemployment
      description: "National unemployment rate (monthly)"
      columns:
        series_id: string
        date: date
        year: integer
        period: string
        value: double
        period_name: string
      partitions: [year]
      tags: [fact, unemployment, monthly]

    fact_cpi:
      path: facts/fact_cpi
      description: "Consumer Price Index (monthly)"
      columns:
        series_id: string
        date: date
        year: integer
        period: string
        value: double
        period_name: string
      partitions: [year]
      tags: [fact, cpi, inflation, monthly]

    fact_employment:
      path: facts/fact_employment
      description: "Total nonfarm employment (monthly)"
      columns:
        series_id: string
        date: date
        year: integer
        period: string
        value: double
        period_name: string
      partitions: [year]
      tags: [fact, employment, monthly]

    fact_wages:
      path: facts/fact_wages
      description: "Average hourly earnings (monthly)"
      columns:
        series_id: string
        date: date
        year: integer
        period: string
        value: double
        period_name: string
      partitions: [year]
      tags: [fact, wages, monthly]

    economic_indicators_wide:
      path: facts/economic_indicators_wide
      description: "All indicators pivoted wide by date"
      columns:
        date: date
        unemployment_rate: double
        cpi_value: double
        total_employment: double
        avg_hourly_earnings: double
      partitions: [date]
      tags: [fact, analytics, wide]

# Available measures
measures:
  avg_unemployment_rate:
    description: "Average unemployment rate"
    source: fact_unemployment.value
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [unemployment, average]

  latest_cpi:
    description: "Latest CPI value"
    source: fact_cpi.value
    aggregation: max
    data_type: double
    format: "#,##0.00"
    tags: [cpi, latest]

  employment_growth:
    description: "Total employment growth"
    source: fact_employment.value
    aggregation: sum
    data_type: double
    format: "#,##0"
    tags: [employment, growth]

  wage_trend:
    description: "Average wage trend"
    source: fact_wages.value
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [wages, average]

# Graph structure
graph:
  nodes:
    - id: dim_economic_series
      from: bronze.bls_unemployment
      select:
        series_id: series_id
      derive:
        series_name: "National Unemployment Rate"
        category: "unemployment"
        frequency: "monthly"
        units: "percent"
        seasonal_adjustment: "seasonally_adjusted"
      tags: [dim, series]
      unique_key: [series_id]

    - id: fact_unemployment
      from: bronze.bls_unemployment
      select:
        series_id: series_id
        date: date
        year: year
        period: period
        value: value
        period_name: period_name
      tags: [fact, unemployment]

    - id: fact_cpi
      from: bronze.bls_cpi
      select:
        series_id: series_id
        date: date
        year: year
        period: period
        value: value
        period_name: period_name
      tags: [fact, cpi]

    - id: fact_employment
      from: bronze.bls_employment
      select:
        series_id: series_id
        date: date
        year: year
        period: period
        value: value
        period_name: period_name
      tags: [fact, employment]

    - id: fact_wages
      from: bronze.bls_wages
      select:
        series_id: series_id
        date: date
        year: year
        period: period
        value: value
        period_name: period_name
      tags: [fact, wages]

  edges:
    - from: fact_unemployment
      to: dim_economic_series
      on: ["series_id=series_id"]
      type: many_to_one
      description: "Unemployment data belongs to a series"

    - from: fact_cpi
      to: dim_economic_series
      on: ["series_id=series_id"]
      type: many_to_one
      description: "CPI data belongs to a series"

    - from: fact_employment
      to: dim_economic_series
      on: ["series_id=series_id"]
      type: many_to_one
      description: "Employment data belongs to a series"

    - from: fact_wages
      to: dim_economic_series
      on: ["series_id=series_id"]
      type: many_to_one
      description: "Wage data belongs to a series"

  paths: []

# BLS Series Configuration
bls_series:
  unemployment:
    series_id: "LNS14000000"
    name: "Unemployment Rate - Civilian Labor Force"
    category: "unemployment"

  cpi:
    series_id: "CUUR0000SA0"
    name: "Consumer Price Index - All Urban Consumers"
    category: "inflation"

  employment:
    series_id: "CES0000000001"
    name: "Total Nonfarm Employment"
    category: "employment"

  wages:
    series_id: "CES0500000003"
    name: "Average Hourly Earnings - Total Private"
    category: "wages"
