version: 1
model: etf
tags: [etf, portfolio, us]

# Dependencies on other models
depends_on:
  - core     # For dim_calendar
  - company  # For underlying holdings

# Storage configuration
storage:
  root: storage/silver/etf
  format: parquet

# Schema definitions
schema:
  dimensions:
    dim_etf:
      path: dims/dim_etf
      description: "ETF dimension with fund information"
      columns:
        etf_ticker: string
        etf_name: string
        fund_family: string
        expense_ratio: double
        inception_date: date
        category: string
        index_tracked: string
        etf_id: string
      primary_key: [etf_ticker]
      tags: [dim, entity, etf]

    dim_etf_holdings:
      path: dims/dim_etf_holdings
      description: "ETF holdings (point-in-time)"
      columns:
        etf_ticker: string
        holding_ticker: string
        as_of_date: date
        weight_percent: double
        shares_held: long
        market_value: double
      primary_key: [etf_ticker, holding_ticker, as_of_date]
      tags: [dim, holdings, temporal]

  facts:
    fact_etf_prices:
      path: facts/fact_etf_prices
      description: "Daily ETF prices"
      columns:
        trade_date: date
        etf_ticker: string
        open: double
        high: double
        low: double
        close: double
        volume_weighted: double
        volume: long
        nav: double
        premium_discount: double
      partitions: [trade_date]
      tags: [fact, prices, timeseries]

    etf_prices_with_info:
      path: facts/etf_prices_with_info
      description: "ETF prices with fund information"
      columns:
        trade_date: date
        etf_ticker: string
        etf_name: string
        fund_family: string
        category: string
        open: double
        high: double
        low: double
        close: double
        volume: long
        nav: double
      partitions: [trade_date]
      tags: [canonical, analytics, materialized]

# Available measures
measures:
  # Simple ETF measures
  avg_expense_ratio:
    description: "Average expense ratio across ETFs"
    source: dim_etf.expense_ratio
    aggregation: avg
    data_type: double
    format: "0.00%"
    tags: [expense, average]

  avg_etf_close:
    description: "Average ETF closing price"
    source: fact_etf_prices.close
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, average]

  avg_premium_discount:
    description: "Average premium/discount to NAV"
    source: fact_etf_prices.premium_discount
    aggregation: avg
    data_type: double
    format: "0.00%"
    tags: [nav, premium]

  # Holdings-based weighted measures (NEW!)
  holdings_weighted_return:
    type: weighted
    description: "ETF return calculated from underlying holdings"
    source: company.fact_prices.close  # Cross-model reference!
    weighting_method: etf_holdings
    weight_column: dim_etf_holdings.weight_percent
    group_by: [trade_date, etf_ticker]
    data_type: double
    format: "$#,##0.00"
    tags: [holdings, weighted, return]

  holdings_weighted_volume:
    type: weighted
    description: "Weighted trading volume of underlying holdings"
    source: company.fact_prices.volume
    weighting_method: etf_holdings
    weight_column: dim_etf_holdings.weight_percent
    group_by: [trade_date, etf_ticker]
    data_type: long
    format: "#,##0"
    tags: [holdings, weighted, volume]

# Graph structure
graph:
  nodes:
    - id: dim_etf
      from: bronze.etf_info
      select:
        etf_ticker: ticker
        etf_name: name
        fund_family: fund_family
        expense_ratio: expense_ratio
        inception_date: inception_date
        category: category
        index_tracked: index_tracked
      derive:
        etf_id: "sha1(etf_ticker)"
      tags: [dim, entity, etf]
      unique_key: [etf_ticker]

    - id: dim_etf_holdings
      from: bronze.etf_holdings
      select:
        etf_ticker: etf_ticker
        holding_ticker: holding_ticker
        as_of_date: as_of_date
        weight_percent: weight_percent
        shares_held: shares_held
        market_value: market_value
      tags: [dim, holdings]
      unique_key: [etf_ticker, holding_ticker, as_of_date]

    - id: fact_etf_prices
      from: bronze.etf_prices_daily
      select:
        trade_date: trade_date
        etf_ticker: ticker
        open: open
        high: high
        low: low
        close: close
        volume_weighted: volume_weighted
        volume: volume
        nav: nav
        premium_discount: premium_discount
      tags: [fact, prices]

  edges:
    # ETF prices to calendar
    - from: fact_etf_prices
      to: core.dim_calendar
      "on": ["trade_date=date"]
      type: left
      description: "Join ETF prices to calendar"

    # ETF prices to ETF info
    - from: fact_etf_prices
      to: dim_etf
      "on": ["etf_ticker=etf_ticker"]
      type: many_to_one
      description: "Prices belong to an ETF"

    # ETF holdings to ETF info
    - from: dim_etf_holdings
      to: dim_etf
      "on": ["etf_ticker=etf_ticker"]
      type: many_to_one
      description: "Holdings belong to an ETF"

    # Cross-model: ETF holdings to company stocks
    - from: dim_etf_holdings
      to: company.dim_company
      "on": ["holding_ticker=ticker"]
      type: many_to_one
      description: "Holdings are company stocks"

  paths:
    - id: etf_prices_with_info
      hops: "fact_etf_prices -> dim_etf"
      description: "ETF prices with fund information"
      tags: [canonical, analytics]

    - id: etf_prices_with_calendar
      hops: "fact_etf_prices -> core.dim_calendar"
      description: "ETF prices with calendar attributes"
      tags: [time, analytics]

    - id: etf_holdings_with_company
      hops: "dim_etf_holdings -> company.dim_company"
      description: "ETF holdings with company information"
      tags: [holdings, analytics]
