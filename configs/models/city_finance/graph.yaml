# City Finance Graph - Nodes, Edges, and Paths
# Defines data transformations and relationships

nodes:
  - id: dim_community_area
    from: bronze.chicago_unemployment
    select:
      geography: geography
      community_name: geography
      geography_type: geography_type
    derive:
      community_area: geography
    tags: [dim, geography]
    unique_key: [community_area]

  - id: dim_permit_type
    from: bronze.chicago_building_permits
    select:
      permit_type: permit_type
    derive:
      permit_category: "general"
    tags: [dim, permits]
    unique_key: [permit_type]

  - id: fact_local_unemployment
    from: bronze.chicago_unemployment
    select:
      geography: geography
      geography_type: geography_type
      date: date
      unemployment_rate: unemployment_rate
      labor_force: labor_force
      employed: employed
      unemployed: unemployed
    tags: [fact, unemployment]

  - id: fact_building_permits
    from: bronze.chicago_building_permits
    select:
      permit_number: id
      permit_type: permit_type
      issue_date: issue_date
      total_fee: total_fee
      contractor_name: contractor_1_name
      work_description: work_description
      community_area: community_area
      latitude: latitude
      longitude: longitude
    tags: [fact, permits]

edges:
  # Internal edges
  - from: fact_local_unemployment
    to: dim_community_area
    "on": ["geography=community_area"]
    type: many_to_one
    description: "Unemployment data by community area"

  - from: fact_building_permits
    to: dim_community_area
    "on": ["community_area=community_area"]
    type: many_to_one
    description: "Permits issued in community area"

  - from: fact_building_permits
    to: dim_permit_type
    "on": ["permit_type=permit_type"]
    type: many_to_one
    description: "Permits by type"

  # Cross-model edges
  - from: fact_local_unemployment
    to: temporal.dim_calendar
    "on": ["date=date"]
    type: left
    description: "Join unemployment to calendar for date-based filtering"

  - from: fact_building_permits
    to: temporal.dim_calendar
    "on": ["issue_date=date"]
    type: left
    description: "Join permits to calendar for date-based filtering"

  - from: fact_local_unemployment
    to: macro.fact_unemployment
    "on": ["date=date"]
    type: left
    description: "Compare local community unemployment vs national unemployment trends"

paths:
  - id: unemployment_with_area
    hops: "fact_local_unemployment -> dim_community_area"
    description: "Unemployment with full community area context"
    tags: [analytics, unemployment]

  - id: permits_with_area
    hops: "fact_building_permits -> dim_community_area"
    description: "Permits with community area details"
    tags: [analytics, permits]
