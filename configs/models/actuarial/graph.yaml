# Actuarial Graph - Node and edge definitions
# Version: 2.0

nodes:
  # Dimensions
  - id: dim_mortality_table
    from: bronze.actuarial_mortality_tables
    description: "Mortality table metadata"
    select:
      table_id: table_id
      table_name: table_name
      table_year: table_year
      gender: gender
      smoker_status: smoker_status
      table_type: table_type
      select_period: select_period
      ultimate_age: ultimate_age
      source: source
      effective_date: effective_date
    tags: [dim, actuarial]
    unique_key: [table_id]

  - id: dim_age_band
    from: bronze.actuarial_age_bands
    description: "Age bands for grouping"
    select:
      age_band_id: age_band_id
      age_min: age_min
      age_max: age_max
      age_band_name: age_band_name
      generation: generation
    tags: [dim, actuarial]
    unique_key: [age_band_id]

  - id: dim_risk_class
    from: bronze.actuarial_risk_classes
    description: "Insurance risk classifications"
    select:
      risk_class_id: risk_class_id
      risk_class_name: risk_class_name
      risk_category: risk_category
      smoker_status: smoker_status
      relative_risk: relative_risk
      description: description
    tags: [dim, actuarial]
    unique_key: [risk_class_id]

  # Facts
  - id: fact_mortality_rates
    from: bronze.actuarial_mortality_rates
    description: "Age-specific mortality rates"
    select:
      table_id: table_id
      age: age
      duration: duration
      qx: qx
      lx: lx
      dx: dx
      ex: ex
      ax: ax
      Ax: Ax
    tags: [fact, actuarial]

  - id: fact_demographic_rates
    from: bronze.actuarial_demographics
    description: "Demographic statistics"
    select:
      state_fips: state_fips
      year: year
      age_band_id: age_band_id
      population: population
      births: births
      deaths: deaths
      crude_death_rate: crude_death_rate
      life_expectancy: life_expectancy
      median_age: median_age
    tags: [fact, actuarial]

  - id: fact_policy_experience
    from: bronze.actuarial_experience
    description: "Policy experience data"
    select:
      experience_id: experience_id
      observation_date: observation_date
      risk_class_id: risk_class_id
      age_band_id: age_band_id
      state_fips: state_fips
      exposure_count: exposure_count
      claim_count: claim_count
      claim_amount: claim_amount
      actual_to_expected: actual_to_expected
      credibility_factor: credibility_factor
    tags: [fact, actuarial]

# Internal edges
edges:
  # Mortality rates link to mortality table
  - from: fact_mortality_rates
    to: dim_mortality_table
    "on": ["table_id=table_id"]
    type: many_to_one
    description: "Rates belong to a mortality table"

  # Demographics link to age bands
  - from: fact_demographic_rates
    to: dim_age_band
    "on": ["age_band_id=age_band_id"]
    type: many_to_one
    description: "Demographics grouped by age band"

  # Policy experience links
  - from: fact_policy_experience
    to: dim_risk_class
    "on": ["risk_class_id=risk_class_id"]
    type: many_to_one
    description: "Experience by risk class"

  - from: fact_policy_experience
    to: dim_age_band
    "on": ["age_band_id=age_band_id"]
    type: many_to_one
    description: "Experience by age band"

# Cross-model edges (to foundation models)
cross_model_edges:
  # Link demographics to geography
  - from: fact_demographic_rates
    to: geography.dim_state
    "on": ["state_fips=state_fips"]
    type: many_to_one
    description: "Demographics by state"

  # Link policy experience to geography
  - from: fact_policy_experience
    to: geography.dim_state
    "on": ["state_fips=state_fips"]
    type: many_to_one
    description: "Experience by state"

# Paths for common analysis
paths:
  - id: mortality_with_table
    hops: "fact_mortality_rates -> dim_mortality_table"
    description: "Mortality rates with table metadata"
    tags: [actuarial, mortality]

  - id: demographics_with_geography
    hops: "fact_demographic_rates -> geography.dim_state"
    description: "Demographics with state details"
    tags: [actuarial, demographics]

  - id: experience_full_context
    hops: "fact_policy_experience -> dim_risk_class, fact_policy_experience -> dim_age_band, fact_policy_experience -> geography.dim_state"
    description: "Experience with all dimension context"
    tags: [actuarial, experience]
