# Actuarial Model Configuration
# Version: 2.0
model: actuarial
version: 2.0
description: "Actuarial analysis model for mortality, demographics, and risk assessment"

# Dependencies - actuarial depends on foundation models
depends_on:
  - temporal
  - geography

# Component files
components:
  schema: actuarial/schema.yaml
  graph: actuarial/graph.yaml
  measures: actuarial/measures.yaml

# Storage configuration
storage:
  root: storage/silver/actuarial
  format: delta

# Model-specific configuration
actuarial_config:
  # Default mortality table parameters
  default_mortality_table: "2017_CSO"  # Commissioners Standard Ordinary
  default_interest_rate: 0.045  # 4.5% annual
  projection_years: 50

tags:
  - actuarial
  - insurance
  - mortality
  - risk
