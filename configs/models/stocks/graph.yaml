# Stocks graph definition - v2.0 with base inheritance
# Consolidated: fact_stock_prices includes all OHLCV + technical indicators

extends: _base.securities.graph

nodes:
  dim_stock:
    extends: _base.securities._dim_security_base
    filters:
      - "asset_type = 'stocks'"
      - "is_active = true"
    select:
      # Inherited from base: ticker, security_name, asset_type, exchange_code, currency, is_active
      # Add stocks-specific fields from Alpha Vantage
      cik: cik
      shares_outstanding: shares_outstanding
      market_cap: market_cap
      sector: sector
      industry: industry
    derive:
      # Inherited: security_id
      company_id: "CONCAT('COMPANY_', cik)"  # Link to company model
    unique_key: [ticker]
    tags: [dim, stock]

  fact_stock_prices:
    extends: _base.securities._fact_prices_base
    filters:
      - "asset_type = 'stocks'"
      - "trade_date IS NOT NULL"
      - "ticker IS NOT NULL"
    # Inherits select from base (ticker, trade_date, open, high, low, close, volume, volume_weighted, transactions)
    derive:
      # Daily Returns
      daily_return: "(close - LAG(close) OVER (PARTITION BY ticker ORDER BY trade_date)) / NULLIF(LAG(close) OVER (PARTITION BY ticker ORDER BY trade_date), 0) * 100"

      # Simple Moving Averages
      sma_20: "AVG(close) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 19 PRECEDING AND CURRENT ROW)"
      sma_50: "AVG(close) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 49 PRECEDING AND CURRENT ROW)"
      sma_200: "AVG(close) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 199 PRECEDING AND CURRENT ROW)"

      # RSI calculation (14-period)
      price_change: "close - LAG(close) OVER (PARTITION BY ticker ORDER BY trade_date)"
      gain: "CASE WHEN price_change > 0 THEN price_change ELSE 0 END"
      loss: "CASE WHEN price_change < 0 THEN ABS(price_change) ELSE 0 END"
      avg_gain_14: "AVG(gain) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 13 PRECEDING AND CURRENT ROW)"
      avg_loss_14: "AVG(loss) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 13 PRECEDING AND CURRENT ROW)"
      rs_14: "avg_gain_14 / NULLIF(avg_loss_14, 0)"
      rsi_14: "100 - (100 / (1 + COALESCE(rs_14, 0)))"

      # Volatility (20-day and 60-day)
      volatility_20d: "STDDEV(daily_return) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 19 PRECEDING AND CURRENT ROW) * SQRT(252)"
      volatility_60d: "STDDEV(daily_return) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 59 PRECEDING AND CURRENT ROW) * SQRT(252)"

      # Bollinger Bands (20-day, 2 std dev)
      bollinger_middle: "sma_20"
      bollinger_upper: "sma_20 + (2 * STDDEV(close) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 19 PRECEDING AND CURRENT ROW))"
      bollinger_lower: "sma_20 - (2 * STDDEV(close) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 19 PRECEDING AND CURRENT ROW))"

      # Volume indicators
      volume_sma_20: "AVG(volume) OVER (PARTITION BY ticker ORDER BY trade_date ROWS BETWEEN 19 PRECEDING AND CURRENT ROW)"
      volume_ratio: "volume / NULLIF(volume_sma_20, 0)"

    tags: [fact, prices, stocks, technical]

edges:
  # Inherit base edges: _prices_to_security, _prices_to_calendar

  stock_to_company:
    from: dim_stock
    to: company.dim_company
    on: ["company_id=company_id"]
    type: many_to_one
    description: "Stock belongs to a company (corporate entity)"

  prices_to_stock:
    from: fact_stock_prices
    to: dim_stock
    on: ["ticker=ticker"]
    type: many_to_one
    description: "Prices belong to a stock"

  prices_to_calendar:
    from: fact_stock_prices
    to: core.dim_calendar
    on: ["trade_date=date"]
    type: left
    description: "Join prices to calendar for date filtering"
