# Stocks schema - extends base securities schema

extends: _base.securities.schema

dimensions:
  dim_stock:
    extends: _base.securities._dim_security
    description: "Stock equity dimension"
    columns:
      # Inherited from _dim_security:
      # - ticker, security_name, asset_type, asset_class
      # - exchange_code, currency, is_active
      # - listing_date, delisting_date, last_updated

      # Stocks-specific fields:
      company_id:
        type: string
        description: "FK to company.dim_company"
        required: true

      cik:
        type: string
        description: "SEC Central Index Key"
        pattern: "^[0-9]{10}$"

      stock_type:
        type: string
        description: "Type of stock"
        enum: [common, preferred, adr, rights, units, warrants]
        default: common

      shares_outstanding:
        type: long
        description: "Current shares outstanding"

      market_cap:
        type: double
        description: "Latest market capitalization"

      beta:
        type: double
        description: "Beta vs. SPY (500-day rolling)"

      sector:
        type: string
        description: "GICS Sector (denormalized from company)"

      industry:
        type: string
        description: "GICS Industry (denormalized from company)"

    primary_key: [ticker]
    tags: [dim, entity, stock, security]

facts:
  fact_stock_prices:
    extends: _base.securities._fact_prices
    description: "Daily stock prices (filtered from unified bronze table)"
    # Inherits all OHLCV columns from base:
    # - ticker, trade_date, open, high, low, close
    # - volume, volume_weighted, transactions

    # No additional columns needed for basic stock prices

  fact_stock_technicals:
    description: "Technical indicators derived from prices"
    columns:
      ticker:
        type: string
        description: "FK to dim_stock"
        required: true

      trade_date:
        type: date
        description: "Trading date"
        required: true

      # Moving averages
      sma_20:
        type: double
        description: "20-day simple moving average"

      sma_50:
        type: double
        description: "50-day simple moving average"

      sma_200:
        type: double
        description: "200-day simple moving average"

      ema_12:
        type: double
        description: "12-day exponential moving average"

      ema_26:
        type: double
        description: "26-day exponential moving average"

      # Momentum indicators
      rsi_14:
        type: double
        description: "14-day Relative Strength Index"
        range: [0, 100]

      macd:
        type: double
        description: "MACD line (12-day EMA - 26-day EMA)"

      macd_signal:
        type: double
        description: "MACD signal line (9-day EMA of MACD)"

      macd_histogram:
        type: double
        description: "MACD histogram (MACD - Signal)"

      # Volatility indicators
      volatility_20d:
        type: double
        description: "20-day rolling volatility (annualized)"

      volatility_60d:
        type: double
        description: "60-day rolling volatility (annualized)"

      bollinger_upper:
        type: double
        description: "Upper Bollinger Band (2 std dev)"

      bollinger_lower:
        type: double
        description: "Lower Bollinger Band (2 std dev)"

      bollinger_middle:
        type: double
        description: "Middle Bollinger Band (20-day SMA)"

      atr_14:
        type: double
        description: "14-day Average True Range"

      # Volume indicators
      volume_sma_20:
        type: double
        description: "20-day volume moving average"

      volume_ratio:
        type: double
        description: "Current volume / 20-day average"

      obv:
        type: double
        description: "On-Balance Volume"

      # Returns
      daily_return:
        type: double
        description: "Daily return percentage"

    primary_key: [ticker, trade_date]
    partitions: [trade_date]
    tags: [fact, technical, derived]
