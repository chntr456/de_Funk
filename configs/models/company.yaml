version: 1
model: company
tags: [equities, polygon, us]

# Dependencies on other models
depends_on:
  - core  # Uses shared dim_calendar for time-based queries

# Storage configuration (model owns its storage)
storage:
  root: storage/silver/company
  format: parquet

# Schema definitions - source of truth for available tables
schema:
  dimensions:
    dim_company:
      path: dims/dim_company
      description: "Company dimension with ticker, exchange info, and market cap"
      columns:
        ticker: string
        company_name: string
        exchange_code: string
        company_id: string
        market_cap_proxy: double
        latest_trade_date: date
      primary_key: [ticker]
      tags: [dim, entity, company]

    dim_exchange:
      path: dims/dim_exchange
      description: "Exchange reference dimension"
      columns:
        exchange_code: string
        exchange_name: string
      primary_key: [exchange_code]
      tags: [dim, ref, exchange]

  facts:
    fact_prices:
      path: facts/fact_prices
      description: "Daily stock prices"
      columns:
        trade_date: date
        ticker: string
        open: double
        high: double
        low: double
        close: double
        volume_weighted: double
        volume: long
      partitions: [trade_date]
      tags: [fact, prices, timeseries]

    fact_news:
      path: facts/fact_news
      description: "News articles by ticker"
      columns:
        publish_date: date
        ticker: string
        article_id: string
        title: string
        source: string
        sentiment: double
      partitions: [publish_date]
      tags: [fact, news]

    prices_with_company:
      path: facts/prices_with_company
      description: "Prices joined with company and exchange info"
      columns:
        trade_date: date
        ticker: string
        company_name: string
        exchange_name: string
        open: double
        high: double
        low: double
        close: double
        volume_weighted: double
        volume: long
      partitions: [trade_date]
      tags: [canonical, analytics, materialized]

    news_with_company:
      path: facts/news_with_company
      description: "News joined with company info"
      columns:
        publish_date: date
        ticker: string
        company_name: string
        article_id: string
        title: string
        source: string
        sentiment: double
      partitions: [publish_date]
      tags: [news, analytics, materialized]

# Available measures - pre-defined aggregations
measures:
  avg_close_price:
    description: "Average closing price"
    source: fact_prices.close
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, average]

  total_volume:
    description: "Total trading volume"
    source: fact_prices.volume
    aggregation: sum
    data_type: long
    format: "#,##0"
    tags: [volume, total]

  max_high:
    description: "Highest price in period"
    source: fact_prices.high
    aggregation: max
    data_type: double
    format: "$#,##0.00"
    tags: [price, max]

  min_low:
    description: "Lowest price in period"
    source: fact_prices.low
    aggregation: min
    data_type: double
    format: "$#,##0.00"
    tags: [price, min]

  avg_vwap:
    description: "Average volume weighted average price"
    source: fact_prices.volume_weighted
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, vwap]

  # Weighted aggregate measures (multi-stock indices)
  equal_weighted_index:
    description: "Equal weighted price index across stocks"
    type: weighted_aggregate
    source: fact_prices.close
    weighting_method: equal
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, equal_weighted]

  volume_weighted_index:
    description: "Volume weighted price index across stocks"
    type: weighted_aggregate
    source: fact_prices.close
    weighting_method: volume
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, volume_weighted]

  market_cap_weighted_index:
    description: "Market cap weighted price index across stocks"
    type: weighted_aggregate
    source: fact_prices.close
    weighting_method: market_cap
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, market_cap_weighted]

  price_weighted_index:
    description: "Price weighted index across stocks"
    type: weighted_aggregate
    source: fact_prices.close
    weighting_method: price
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, price_weighted]

  volume_deviation_weighted_index:
    description: "Volume deviation weighted index (unusual activity)"
    type: weighted_aggregate
    source: fact_prices.close
    weighting_method: volume_deviation
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, volume_deviation]

  volatility_weighted_index:
    description: "Inverse volatility weighted index (risk-adjusted)"
    type: weighted_aggregate
    source: fact_prices.close
    weighting_method: volatility
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, volatility_weighted]

# Graph structure for visualization and future graph database
graph:
  nodes:
    - id: dim_company
      from: bronze.ref_ticker
      select:
        ticker: ticker
        company_name: name
        exchange_code: exchange_code
      derive:
        company_id: "sha1(ticker)"
      tags: [dim, entity, company]
      unique_key: [ticker]

    - id: dim_exchange
      from: bronze.exchanges
      select:
        exchange_code: code
        exchange_name: name
      tags: [dim, ref, exchange]
      unique_key: [exchange_code]

    - id: fact_prices
      from: bronze.prices_daily
      select:
        trade_date: trade_date
        ticker: ticker
        open: open
        high: high
        low: low
        close: close
        volume_weighted: volume_weighted
        volume: volume
      tags: [fact, prices]

    - id: fact_news
      from: bronze.news
      select:
        publish_date: publish_date
        ticker: ticker
        article_id: article_id
        title: title
        source: source
        sentiment: sentiment
      tags: [fact, news]

  edges:
    - from: fact_prices
      to: dim_company
      on: ["ticker=ticker"]
      type: many_to_one
      description: "Prices belong to a company"

    - from: dim_company
      to: dim_exchange
      on: ["exchange_code=exchange_code"]
      type: many_to_one
      description: "Company lists on an exchange"

    - from: fact_news
      to: dim_company
      on: ["ticker=ticker"]
      type: many_to_one
      description: "News articles about a company"

  paths:
    - id: prices_with_company
      hops: "fact_prices -> dim_company -> dim_exchange"
      description: "Prices with full company and exchange context"
      tags: [canonical, analytics]

    - id: news_with_company
      hops: "fact_news -> dim_company"
      description: "News with company context"
      tags: [news, analytics]
