# ⚠️  DEPRECATED: This model has been replaced by equity + corporate models
#
# Migration:
#   - For price/trading data: Use configs/models/equity.yaml (EquityModel)
#   - For corporate fundamentals: Use configs/models/corporate.yaml (CorporateModel)
#
# See docs/EQUITY_CORPORATE_MIGRATION_GUIDE.md for full migration instructions.
#
# This config remains for backward compatibility but will be removed in a future release.

version: 1
model: company
tags: [equities, polygon, us, deprecated]

# Dependencies on other models
depends_on:
  - core  # Uses shared dim_calendar for time-based queries

# Storage configuration (model owns its storage)
storage:
  root: storage/silver/company
  format: parquet

# Schema definitions - source of truth for available tables
schema:
  dimensions:
    dim_company:
      path: dims/dim_company
      description: "Company dimension with ticker, exchange info, and market cap"
      columns:
        ticker: string
        company_name: string
        exchange_code: string
        company_id: string
        market_cap_proxy: double
        latest_trade_date: date
      primary_key: [ticker]
      tags: [dim, entity, company]

    dim_exchange:
      path: dims/dim_exchange
      description: "Exchange reference dimension"
      columns:
        exchange_code: string
        exchange_name: string
      primary_key: [exchange_code]
      tags: [dim, ref, exchange]

  facts:
    # NOTE: fact_prices removed in v2.0 - prices are now in stocks.fact_stock_prices
    # See stocks/schema.yaml for price data

    fact_news:
      path: facts/fact_news
      description: "News articles by ticker"
      columns:
        publish_date: date
        ticker: string
        article_id: string
        title: string
        source: string
        sentiment: double
      partitions: [publish_date]
      tags: [fact, news]

    # NOTE: prices_with_company removed in v2.0 - use stocks model for price data

    news_with_company:
      path: facts/news_with_company
      description: "News joined with company info"
      columns:
        publish_date: date
        ticker: string
        company_name: string
        article_id: string
        title: string
        source: string
        sentiment: double
      partitions: [publish_date]
      tags: [news, analytics, materialized]

# Available measures - pre-defined aggregations
# NOTE: Price-related measures moved to stocks model in v2.0
# See configs/models/stocks/measures.yaml for price measures
measures:
  company_count:
    description: "Count of companies"
    source: dim_company.ticker
    aggregation: count
    data_type: long
    format: "#,##0"
    tags: [company, count]

# Graph structure - Company model v2.0
# NOTE: fact_prices removed - prices are now in stocks model
graph:
  nodes:
    - id: dim_company
      from: bronze.securities_reference
      filters:
        - "asset_type = 'stocks'"
      select:
        ticker: ticker
        company_name: name
        exchange_code: exchange
        cik: cik
        sector: sector
        industry: industry
        market_cap: market_cap
      derive:
        company_id: "CONCAT('COMPANY_', LPAD(cik, 10, '0'))"
      tags: [dim, entity, company]
      unique_key: [ticker]

    - id: fact_income_statements
      from: bronze.fundamentals_income
      select:
        ticker: ticker
        fiscal_date: fiscal_date_ending
        report_type: report_type
        total_revenue: total_revenue
        gross_profit: gross_profit
        operating_income: operating_income
        net_income: net_income
        ebitda: ebitda
      tags: [fact, fundamentals, income]

    - id: fact_balance_sheets
      from: bronze.fundamentals_balance
      select:
        ticker: ticker
        fiscal_date: fiscal_date_ending
        report_type: report_type
        total_assets: total_assets
        total_liabilities: total_liabilities
        total_equity: total_shareholder_equity
        cash: cash_and_cash_equivalents
        debt: total_debt
      tags: [fact, fundamentals, balance]

    - id: fact_cash_flows
      from: bronze.fundamentals_cashflow
      select:
        ticker: ticker
        fiscal_date: fiscal_date_ending
        report_type: report_type
        operating_cashflow: operating_cashflow
        investing_cashflow: cashflow_from_investment
        financing_cashflow: cashflow_from_financing
        free_cashflow: free_cashflow
      tags: [fact, fundamentals, cashflow]

    - id: fact_earnings
      from: bronze.fundamentals_earnings
      select:
        ticker: ticker
        fiscal_date: fiscal_date_ending
        report_type: report_type
        reported_eps: reported_eps
        estimated_eps: estimated_eps
        surprise: surprise
        surprise_percentage: surprise_percentage
      tags: [fact, fundamentals, earnings]

  edges:
    - from: fact_income_statements
      to: dim_company
      "on": ["ticker=ticker"]
      type: many_to_one
      description: "Income statements belong to a company"

    - from: fact_balance_sheets
      to: dim_company
      "on": ["ticker=ticker"]
      type: many_to_one
      description: "Balance sheets belong to a company"

    - from: fact_cash_flows
      to: dim_company
      "on": ["ticker=ticker"]
      type: many_to_one
      description: "Cash flows belong to a company"

    - from: fact_earnings
      to: dim_company
      "on": ["ticker=ticker"]
      type: many_to_one
      description: "Earnings belong to a company"

  paths:
    - id: income_with_company
      hops: "fact_income_statements -> dim_company"
      description: "Income statements with company context"
      tags: [fundamentals, analytics]

    - id: balance_with_company
      hops: "fact_balance_sheets -> dim_company"
      description: "Balance sheets with company context"
      tags: [fundamentals, analytics]
