# Base graph patterns for securities
# Models can extend and override these patterns

nodes:
  _dim_security_base:
    from: bronze.company_reference
    filters:
      # Override in child: - "type = 'Common Stock'"
      # Use 'type' column (raw Alpha Vantage value) rather than derived 'asset_type'
      # 'type' values: 'Common Stock', 'ETF', 'Mutual Fund', etc.
      - "is_active = true"
    select:
      ticker: ticker
      security_name: security_name  # Bronze column name (Alpha Vantage)
      security_type: type  # Raw Alpha Vantage type (Common Stock, ETF, etc.)
      exchange_code: primary_exchange  # Bronze column name
      currency: currency
      is_active: is_active  # Bronze column name (already boolean)
    derive:
      security_id: "sha1(ticker)"
    unique_key: [ticker]  # Dedup by ticker - ignores snapshot_dt
    tags: [dim, entity]

  _fact_prices_base:
    from: bronze.securities_prices_daily
    filters:
      # Override in child: - "asset_type = 'stocks'"
      - "trade_date IS NOT NULL"
      - "ticker IS NOT NULL"
    select:
      ticker: ticker
      trade_date: trade_date
      open: open
      high: high
      low: low
      close: close
      volume: volume
      adjusted_close: adjusted_close
    unique_key: [ticker, trade_date]  # Dedup by ticker+date - ignores snapshot_dt
    tags: [fact, prices]

edges:
  _prices_to_security:
    from: _fact_prices
    to: _dim_security
    "on": ["ticker=ticker"]
    type: many_to_one
    description: "Prices belong to a security"

  _prices_to_calendar:
    from: _fact_prices
    to: temporal.dim_calendar
    "on": ["trade_date=date"]
    type: left
    description: "Join prices to calendar for date filtering"
