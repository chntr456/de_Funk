# Base graph patterns for securities
# Models can extend and override these patterns

nodes:
  _dim_security_base:
    from: bronze.company_reference
    filters:
      # Override in child: - "AssetType = 'Common Stock'"
      # Use 'AssetType' column (raw Alpha Vantage value)
      # 'AssetType' values: 'Stock', 'Common Stock', 'ETF', etc.
      []
    select:
      ticker: ticker
      security_name: company_name  # Bronze column name (Alpha Vantage)
      security_type: AssetType  # Raw Alpha Vantage type (Stock, ETF, etc.)
      exchange_code: exchange_code  # Bronze column name
      currency: currency
    derive:
      security_id: "CONCAT(AssetType, '_', ticker)"
      is_active: "true"
    primary_key: [security_id]
    unique_key: [ticker]  # Dedup by ticker - ignores snapshot_dt
    tags: [dim, entity]

  _fact_prices_base:
    from: bronze.securities_prices_daily
    filters:
      # Override in child if needed
      - "trade_date IS NOT NULL"
      - "ticker IS NOT NULL"
    select:
      ticker: ticker
      trade_date: trade_date
      open: open
      high: high
      low: low
      close: close
      volume: volume
      adjusted_close: adjusted_close
    derive:
      price_id: "CONCAT(ticker, '_', trade_date)"
    primary_key: [price_id]
    unique_key: [ticker, trade_date]  # Dedup by ticker+date - ignores snapshot_dt
    tags: [fact, prices]

edges:
  _prices_to_security:
    from: _fact_prices
    to: _dim_security
    "on": ["ticker=ticker"]
    type: many_to_one
    description: "Prices belong to a security"

  _prices_to_calendar:
    from: _fact_prices
    to: temporal.dim_calendar
    "on": ["trade_date=date"]
    type: left
    description: "Join prices to calendar for date filtering"
