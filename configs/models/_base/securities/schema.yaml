# Base schema for all tradable securities
# Other models extend this via: extends: _base.securities.schema

dimensions:
  _dim_security:
    description: "Base dimension for all tradable securities"
    columns:
      ticker:
        type: string
        description: "Trading symbol (e.g., AAPL, AAPL240315C00150000)"
        required: true

      security_name:
        type: string
        description: "Display name of the security"

      asset_type:
        type: string
        description: "Type of asset"
        enum: [stocks, options, etfs, futures, crypto]

      asset_class:
        type: string
        description: "Asset class category"
        enum: [stocks, options, indices, forex, crypto, commodities]

      exchange_code:
        type: string
        description: "Primary exchange code (NYSE, NASDAQ, etc.)"

      currency:
        type: string
        description: "Trading currency"
        default: "USD"

      is_active:
        type: boolean
        description: "Currently trading"
        default: true

      listing_date:
        type: date
        description: "Date first listed"

      delisting_date:
        type: date
        description: "Date delisted (null if active)"

      last_updated:
        type: timestamp
        description: "Last metadata update"

    primary_key: [ticker]
    tags: [dim, entity, security]

facts:
  _fact_prices:
    description: "Base OHLCV price data for all securities"
    columns:
      ticker:
        type: string
        description: "FK to dim_security"
        required: true

      trade_date:
        type: date
        description: "Trading date"
        required: true

      open:
        type: double
        description: "Opening price"

      high:
        type: double
        description: "Highest price"

      low:
        type: double
        description: "Lowest price"

      close:
        type: double
        description: "Closing price"
        required: true

      volume:
        type: double
        description: "Trading volume"

      volume_weighted:
        type: double
        description: "Volume weighted average price (VWAP)"

      transactions:
        type: long
        description: "Number of transactions"

    primary_key: [ticker, trade_date]
    partitions: [trade_date]
    tags: [fact, prices, timeseries, ohlcv]
