# Core Model - Foundation dimensions (calendar, geography)
# This is the foundational model that all other models depend on

model: core
version: 2.0
description: "Core shared dimensions and reference data used across all models"
tags: [shared, common, dimensions, reference, foundation]

# No inheritance - core is the foundation
depends_on: []  # No dependencies - this is Tier 0

# Component composition
components:
  schema: core/schema.yaml
  graph: core/graph.yaml
  measures: core/measures.yaml

# Storage configuration
storage:
  root: storage/silver/core
  format: parquet

# Build configuration
build:
  partitions: []
  sort_by: [date]
  optimize: true

# Metadata
metadata:
  owner: data_engineering
  domain: foundation
  sla_hours: 1
  description: |
    Core provides foundational dimensions that all other models depend on:
    - dim_calendar: Universal calendar dimension with rich date attributes
    - Future: dim_geography (US states, counties, cities)
    - Future: dim_time (time of day dimension)
