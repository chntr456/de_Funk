version: 1
model: equity
tags: [equities, trading, market_data, polygon]

# Dependencies on other models
depends_on:
  - core        # Calendar dimension
  - corporate   # Company entity dimension (cross-model relationship)

# Storage configuration (model owns its storage)
storage:
  root: storage/silver/equity
  format: parquet

# Schema definitions - source of truth for available tables
schema:
  dimensions:
    dim_equity:
      path: dims/dim_equity
      description: "Equity instrument master (tradable securities with ticker symbols)"
      columns:
        ticker: string                    # PK - Trading symbol (e.g., "AAPL", "MSFT")
        company_id: string                # FK → corporate.dim_corporate.company_id
        company_name: string              # Denormalized for convenience
        exchange_code: string             # Where traded (NASDAQ, NYSE, etc.)
        security_type: string             # common_stock, preferred_stock, adr, etc.
        currency: string                  # USD, EUR, etc.
        is_active: boolean                # Currently trading
        listing_date: date                # When listed on exchange
        delisting_date: date              # When delisted (null if active)
        shares_outstanding: long          # Latest shares outstanding (for market cap)
        last_updated: timestamp
      primary_key: [ticker]
      tags: [dim, entity, equity, ticker]

    dim_exchange:
      path: dims/dim_exchange
      description: "Exchange reference dimension"
      columns:
        exchange_code: string             # PK
        exchange_name: string
        country: string
        timezone: string
      primary_key: [exchange_code]
      tags: [dim, ref, exchange]

  facts:
    fact_equity_prices:
      path: facts/fact_equity_prices
      description: "Daily OHLCV equity prices (replaces fact_prices from company model)"
      columns:
        ticker: string                    # FK → dim_equity.ticker
        trade_date: date                  # PK component
        open: double
        high: double
        low: double
        close: double                     # Unadjusted close price
        volume: long                      # Trading volume
        volume_weighted: double           # VWAP - Volume Weighted Average Price
        transactions: long                # Number of trades (if available)
        market_cap: double                # Calculated: close * shares_outstanding
      partitions: [trade_date]
      tags: [fact, prices, timeseries, ohlcv]

    fact_equity_technicals:
      path: facts/fact_equity_technicals
      description: "Technical indicators calculated from price data"
      columns:
        ticker: string                    # FK → dim_equity.ticker
        trade_date: date                  # PK component
        # Moving averages
        sma_20: double                    # 20-day Simple Moving Average
        sma_50: double                    # 50-day SMA
        sma_200: double                   # 200-day SMA
        ema_12: double                    # 12-day Exponential MA
        ema_26: double                    # 26-day EMA
        # Momentum indicators
        rsi_14: double                    # 14-day Relative Strength Index (0-100)
        macd: double                      # MACD line (12-day EMA - 26-day EMA)
        macd_signal: double               # Signal line (9-day EMA of MACD)
        macd_histogram: double            # MACD - Signal
        # Volatility indicators
        bollinger_upper: double           # Upper Bollinger Band (2 std dev)
        bollinger_lower: double           # Lower Bollinger Band
        bollinger_middle: double          # Middle band (20-day SMA)
        atr_14: double                    # 14-day Average True Range
        # Volume indicators
        obv: double                       # On-Balance Volume
        # Risk metrics
        volatility_20d: double            # 20-day rolling standard deviation
        volatility_60d: double            # 60-day rolling standard deviation
        beta: double                      # Beta vs. market (SPY)
      partitions: [trade_date]
      tags: [fact, technicals, indicators, calculated]

    fact_equity_news:
      path: facts/fact_equity_news
      description: "News articles by ticker (replaces fact_news from company model)"
      columns:
        ticker: string                    # FK → dim_equity.ticker
        publish_date: date
        article_id: string
        title: string
        source: string
        sentiment: double                 # Sentiment score (-1 to 1)
        url: string
      partitions: [publish_date]
      tags: [fact, news, sentiment]

    # Materialized analytics paths
    equity_prices_with_company:
      path: facts/equity_prices_with_company
      description: "Prices joined with equity and exchange info (replaces prices_with_company)"
      columns:
        ticker: string
        trade_date: date
        company_name: string
        exchange_name: string
        open: double
        high: double
        low: double
        close: double
        volume: long
        volume_weighted: double
        market_cap: double
      partitions: [trade_date]
      tags: [canonical, analytics, materialized]

    equity_news_with_company:
      path: facts/equity_news_with_company
      description: "News joined with equity info (replaces news_with_company)"
      columns:
        ticker: string
        publish_date: date
        company_name: string
        article_id: string
        title: string
        source: string
        sentiment: double
      partitions: [publish_date]
      tags: [news, analytics, materialized]

# Edges define relationships between tables
edges:
  # Equity prices to equity dimension
  - from: fact_equity_prices.ticker
    to: dim_equity.ticker
    type: many_to_one
    description: "Each price record belongs to an equity"

  # Equity technicals to equity dimension
  - from: fact_equity_technicals.ticker
    to: dim_equity.ticker
    type: many_to_one

  # Equity news to equity dimension
  - from: fact_equity_news.ticker
    to: dim_equity.ticker
    type: many_to_one

  # Equity to exchange
  - from: dim_equity.exchange_code
    to: dim_exchange.exchange_code
    type: many_to_one
    description: "Each equity is listed on an exchange"

  # CROSS-MODEL EDGE: Equity to Corporate
  - from: dim_equity.company_id
    to: corporate.dim_corporate.company_id
    type: many_to_one
    description: "Each equity (ticker) belongs to a corporate entity (company)"

# Paths define materialized views (joins)
paths:
  equity_prices_with_company:
    description: "Canonical analytics path: prices with equity and exchange info"
    base: fact_equity_prices
    joins:
      - table: dim_equity
        on: fact_equity_prices.ticker = dim_equity.ticker
      - table: dim_exchange
        on: dim_equity.exchange_code = dim_exchange.exchange_code
    select:
      - fact_equity_prices.ticker
      - fact_equity_prices.trade_date
      - dim_equity.company_name
      - dim_exchange.exchange_name
      - fact_equity_prices.open
      - fact_equity_prices.high
      - fact_equity_prices.low
      - fact_equity_prices.close
      - fact_equity_prices.volume
      - fact_equity_prices.volume_weighted
      - fact_equity_prices.market_cap

  equity_news_with_company:
    description: "News with equity info"
    base: fact_equity_news
    joins:
      - table: dim_equity
        on: fact_equity_news.ticker = dim_equity.ticker
    select:
      - fact_equity_news.ticker
      - fact_equity_news.publish_date
      - dim_equity.company_name
      - fact_equity_news.article_id
      - fact_equity_news.title
      - fact_equity_news.source
      - fact_equity_news.sentiment

# Measures - pre-defined aggregations
measures:
  # ============================================================
  # SIMPLE PRICE MEASURES
  # ============================================================

  avg_close_price:
    description: "Average closing price"
    type: simple
    source: fact_equity_prices.close
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, average]

  total_volume:
    description: "Total trading volume"
    type: simple
    source: fact_equity_prices.volume
    aggregation: sum
    data_type: long
    format: "#,##0"
    tags: [volume, total]

  max_high:
    description: "Highest price in period"
    type: simple
    source: fact_equity_prices.high
    aggregation: max
    data_type: double
    format: "$#,##0.00"
    tags: [price, max]

  min_low:
    description: "Lowest price in period"
    type: simple
    source: fact_equity_prices.low
    aggregation: min
    data_type: double
    format: "$#,##0.00"
    tags: [price, min]

  avg_vwap:
    description: "Average volume weighted average price"
    type: simple
    source: fact_equity_prices.volume_weighted
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, vwap]

  avg_market_cap:
    description: "Average market capitalization"
    type: simple
    source: fact_equity_prices.market_cap
    aggregation: avg
    data_type: double
    format: "$#,##0.00M"
    tags: [market, valuation]

  # ============================================================
  # WEIGHTED AGGREGATE MEASURES (CROSS-TICKER INDICES)
  # ============================================================

  equal_weighted_index:
    description: "Equal weighted price index across stocks"
    type: weighted
    source: fact_equity_prices.close
    weighting_method: equal
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, equal_weighted]

  volume_weighted_index:
    description: "Volume weighted price index across stocks"
    type: weighted
    source: fact_equity_prices.close
    weighting_method: volume
    weight_column: fact_equity_prices.volume
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, volume_weighted]

  market_cap_weighted_index:
    description: "Market cap weighted price index across stocks"
    type: weighted
    source: fact_equity_prices.close
    weighting_method: market_cap
    weight_column: fact_equity_prices.market_cap
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, market_cap_weighted]

  price_weighted_index:
    description: "Price weighted index (like DJIA)"
    type: weighted
    source: fact_equity_prices.close
    weighting_method: price
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, price_weighted]

  volume_deviation_weighted_index:
    description: "Volume deviation weighted index"
    type: weighted
    source: fact_equity_prices.close
    weighting_method: volume_deviation
    weight_column: fact_equity_prices.volume
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, volume_deviation_weighted]

  volatility_weighted_index:
    description: "Volatility weighted index (inverse volatility)"
    type: weighted
    source: fact_equity_prices.close
    weighting_method: volatility
    group_by: [trade_date]
    data_type: double
    format: "$#,##0.00"
    tags: [index, aggregate, volatility_weighted]

  # ============================================================
  # TECHNICAL INDICATOR MEASURES
  # ============================================================

  avg_rsi:
    description: "Average RSI across period"
    type: simple
    source: fact_equity_technicals.rsi_14
    aggregation: avg
    data_type: double
    format: "#,##0.00"
    tags: [technical, momentum]

  avg_volatility_20d:
    description: "Average 20-day volatility"
    type: simple
    source: fact_equity_technicals.volatility_20d
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [technical, volatility, risk]

  avg_beta:
    description: "Average beta vs. market"
    type: simple
    source: fact_equity_technicals.beta
    aggregation: avg
    data_type: double
    format: "#,##0.00"
    tags: [risk, market]

  # ============================================================
  # COMPUTED MEASURES
  # ============================================================

  market_cap_calc:
    description: "Market capitalization (close * volume as proxy)"
    type: computed
    source: fact_equity_prices.close
    expression: "close * volume"
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [market, valuation, computed]

  price_range:
    description: "Daily price range (high - low)"
    type: computed
    source: fact_equity_prices.high
    expression: "high - low"
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [price, volatility, computed]

# Bronze sources mapping (where to load data from)
bronze_sources:
  dim_equity:
    # Built from ref_ticker bronze data
    source: ref_ticker
    transforms:
      - type: select
        columns:
          ticker: ticker
          company_name: name
          exchange_code: exchange_code
      - type: add_columns
        columns:
          company_id: "CONCAT('COMPANY_', ticker)"  # Generate company_id from ticker
          is_active: true
          security_type: "'common_stock'"
          currency: "'USD'"

  dim_exchange:
    source: exchanges
    transforms:
      - type: select
        columns:
          exchange_code: operating_mic
          exchange_name: name
          country: country
          timezone: timezone

  fact_equity_prices:
    # Loaded from prices_daily bronze data
    source: prices_daily
    transforms:
      - type: select
        columns:
          ticker: ticker
          trade_date: trade_date
          open: open
          high: high
          low: low
          close: close
          volume: volume
          volume_weighted: volume_weighted
      - type: add_columns
        columns:
          transactions: "NULL"
          market_cap: "close * volume"  # Proxy calculation

  fact_equity_news:
    source: news
    transforms:
      - type: select
        columns:
          ticker: ticker
          publish_date: publish_date
          article_id: article_id
          title: title
          source: source
          sentiment: sentiment
      - type: add_columns
        columns:
          url: "NULL"
