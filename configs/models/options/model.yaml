# Options Model - Options contracts
# Inherits from securities base class

model: options
version: 2.0
description: "Options contracts with strike, expiry, and Greeks"
tags: [options, derivatives, securities]

# Model inheritance and dependencies
inherits_from: _base.securities      # Inherits schema, graph, measures
depends_on: [temporal, stocks]       # Options derive value from underlying stocks

# Component composition
components:
  schema: options/schema.yaml
  graph: options/graph.yaml
  measures:
    yaml: options/measures.yaml
    python: securities/options/measures.py  # Greeks, implied vol (models/domains/...)

# Storage configuration
storage:
  root: storage/silver/options
  format: delta

# Build configuration
build:
  partitions: [trade_date]
  sort_by: [ticker, expiry_date, strike_price]
  optimize: true

# Metadata
metadata:
  owner: data_engineering
  domain: derivatives
  sla_hours: 4
