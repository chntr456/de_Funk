version: 1
model: forecast
tags: [timeseries, forecast, ml]

# Storage configuration
storage:
  root: storage/silver/forecast
  format: parquet

# Schema definitions for forecast outputs
schema:
  facts:
    fact_forecasts:
      path: facts/forecast_price
      description: "Price and volume forecasts with confidence intervals"
      columns:
        ticker: string
        target: string                # 'close' or 'volume'
        forecast_date: date          # Date of the forecast
        prediction_date: date         # Date being predicted
        horizon: int                  # Days ahead (1-30)
        model_name: string            # ARIMA_7d, Prophet_30d, etc.
        predicted_close: double       # Predicted closing price (null for volume)
        predicted_volume: long        # Predicted volume (null for price)
        lower_bound: double           # Lower confidence interval (95%)
        upper_bound: double           # Upper confidence interval (95%)
        confidence: double            # Confidence level (0-1)
      partitions: [forecast_date]
      tags: [fact, forecast, price, volume]

    fact_forecast_metrics:
      path: facts/forecast_metrics
      description: "Forecast accuracy metrics and errors"
      columns:
        ticker: string
        model_name: string
        metric_date: date
        training_start: date
        training_end: date
        test_start: date
        test_end: date
        mae: double                   # Mean Absolute Error
        rmse: double                  # Root Mean Squared Error
        mape: double                  # Mean Absolute Percentage Error
        r2_score: double              # R-squared score
        num_predictions: int
        avg_error_pct: double
      partitions: [metric_date]
      tags: [fact, metrics, accuracy]

    fact_model_registry:
      path: facts/model_registry
      description: "Registry of trained models and parameters"
      columns:
        model_id: string
        model_name: string
        model_type: string            # ARIMA, Prophet, RandomForest
        ticker: string
        target_variable: string       # close, volume
        lookback_days: int
        forecast_horizon: int
        day_of_week_adj: boolean
        parameters: string            # JSON of model parameters
        trained_date: date
        training_samples: int
        status: string                # active, archived
      partitions: [trained_date]
      tags: [dim, registry, models]

# Available measures for forecasts
measures:
  avg_forecast_error:
    description: "Average forecast error (MAE)"
    source: forecast_metrics.mae
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [error, accuracy]

  avg_forecast_mape:
    description: "Average Mean Absolute Percentage Error"
    source: forecast_metrics.mape
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [error, percentage]

  best_model_r2:
    description: "Best R-squared score across models"
    source: forecast_metrics.r2_score
    aggregation: max
    data_type: double
    format: "#,##0.0000"
    tags: [accuracy, r2]

# Model configurations
models:
  # ARIMA models with different lookback periods
  arima_7d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 7
    forecast_horizon: 7
    day_of_week_adj: true
    auto_arima: true
    seasonal: false

  arima_14d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 14
    forecast_horizon: 14
    day_of_week_adj: true
    auto_arima: true
    seasonal: false

  arima_30d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 30
    day_of_week_adj: true
    auto_arima: true
    seasonal: true

  arima_60d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 60
    forecast_horizon: 30
    day_of_week_adj: true
    auto_arima: true
    seasonal: true

  # Prophet models
  prophet_7d:
    type: Prophet
    target: [close, volume]
    lookback_days: 7
    forecast_horizon: 7
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: false

  prophet_30d:
    type: Prophet
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 30
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: true

  prophet_60d:
    type: Prophet
    target: [close, volume]
    lookback_days: 60
    forecast_horizon: 30
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: true

  # Random Forest models for comparison
  random_forest_14d:
    type: RandomForest
    target: [close, volume]
    lookback_days: 14
    forecast_horizon: 7
    day_of_week_adj: true
    n_estimators: 100
    max_depth: 10
    features:
      - lag_1
      - lag_7
      - lag_14
      - day_of_week
      - rolling_mean_7
      - rolling_std_7

  random_forest_30d:
    type: RandomForest
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 14
    day_of_week_adj: true
    n_estimators: 100
    max_depth: 10
    features:
      - lag_1
      - lag_7
      - lag_14
      - lag_30
      - day_of_week
      - rolling_mean_7
      - rolling_std_7
      - rolling_mean_30
      - rolling_std_30

# Dependencies on other models
depends_on:
  - core     # Uses shared dim_calendar for time-based queries
  - equity   # Forecast model reads from equity model for training data
  - corporate # Corporate fundamentals for enhanced predictions

# Graph structure for forecast model
# Joins to dim_calendar for standard date filtering
graph:
  nodes:
    - id: fact_forecasts
      from: silver.forecasts
      description: "Pre-computed forecast predictions"
      tags: [fact, forecast, predictions]

    - id: fact_forecast_metrics
      from: silver.metrics
      description: "Pre-computed forecast accuracy metrics"
      tags: [fact, metrics]

    - id: fact_model_registry
      from: silver.model_registry
      description: "Registry of trained models"
      tags: [dim, registry]

  # Join forecast tables to dim_calendar for standard date filtering
  edges:
    - from: fact_forecasts
      to: core.dim_calendar
      "on": ["prediction_date=date"]
      type: left
      description: "Join forecasts to calendar on prediction date"

    - from: fact_forecast_metrics
      to: core.dim_calendar
      "on": ["metric_date=date"]
      type: left
      description: "Join metrics to calendar on metric date"

    # Cross-model edge: forecast inherits from equity for ticker dimension
    - from: fact_forecasts
      to: equity.fact_equity_prices
      "on": ["ticker=ticker"]
      type: left
      description: "Join forecasts to equity prices on ticker (shared dimension)"

    - from: fact_forecasts
      to: equity.dim_equity
      "on": ["ticker=ticker"]
      type: left
      description: "Join forecasts to equity dimension on ticker"

    # Edge for vw_price_predictions view (unified actuals + predictions)
    - from: vw_price_predictions
      to: core.dim_calendar
      "on": ["date=date"]
      type: left
      description: "Join price predictions view to calendar (unified date column)"

  # Define paths for common queries
  paths:
    - id: forecasts_with_calendar
      nodes: [fact_forecasts, core.dim_calendar]
      description: "Forecasts with calendar attributes for date filtering"

    - id: metrics_with_calendar
      nodes: [fact_forecast_metrics, core.dim_calendar]
      description: "Metrics with calendar attributes for date filtering"
