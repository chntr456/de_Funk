version: 1
model: forecast
tags: [timeseries, forecast, ml]

# Storage configuration
storage:
  root: storage/silver/forecast
  format: parquet

# Schema definitions for forecast outputs
schema:
  facts:
    forecast_price:
      path: facts/forecast_price
      description: "Price forecasts with confidence intervals"
      columns:
        ticker: string
        forecast_date: date          # Date of the forecast
        prediction_date: date         # Date being predicted
        horizon: int                  # Days ahead (1-30)
        model_name: string            # ARIMA_7d, Prophet_30d, etc.
        predicted_close: double       # Predicted closing price
        lower_bound: double           # Lower confidence interval (95%)
        upper_bound: double           # Upper confidence interval (95%)
        confidence: double            # Confidence level (0-1)
      partitions: [forecast_date]
      tags: [fact, forecast, price]

    forecast_volume:
      path: facts/forecast_volume
      description: "Volume forecasts with confidence intervals"
      columns:
        ticker: string
        forecast_date: date
        prediction_date: date
        horizon: int
        model_name: string
        predicted_volume: long
        lower_bound: long
        upper_bound: long
        confidence: double
      partitions: [forecast_date]
      tags: [fact, forecast, volume]

    forecast_metrics:
      path: facts/forecast_metrics
      description: "Forecast accuracy metrics and errors"
      columns:
        ticker: string
        model_name: string
        metric_date: date
        training_start: date
        training_end: date
        test_start: date
        test_end: date
        mae: double                   # Mean Absolute Error
        rmse: double                  # Root Mean Squared Error
        mape: double                  # Mean Absolute Percentage Error
        r2_score: double              # R-squared score
        num_predictions: int
        avg_error_pct: double
      partitions: [metric_date]
      tags: [fact, metrics, accuracy]

    model_registry:
      path: facts/model_registry
      description: "Registry of trained models and parameters"
      columns:
        model_id: string
        model_name: string
        model_type: string            # ARIMA, Prophet, RandomForest
        ticker: string
        target_variable: string       # close, volume
        lookback_days: int
        forecast_horizon: int
        day_of_week_adj: boolean
        parameters: string            # JSON of model parameters
        trained_date: date
        training_samples: int
        status: string                # active, archived
      partitions: [trained_date]
      tags: [dim, registry, models]

# Available measures for forecasts
measures:
  avg_forecast_error:
    description: "Average forecast error (MAE)"
    source: forecast_metrics.mae
    aggregation: avg
    data_type: double
    format: "$#,##0.00"
    tags: [error, accuracy]

  avg_forecast_mape:
    description: "Average Mean Absolute Percentage Error"
    source: forecast_metrics.mape
    aggregation: avg
    data_type: double
    format: "#,##0.00%"
    tags: [error, percentage]

  best_model_r2:
    description: "Best R-squared score across models"
    source: forecast_metrics.r2_score
    aggregation: max
    data_type: double
    format: "#,##0.0000"
    tags: [accuracy, r2]

# Model configurations
models:
  # ARIMA models with different lookback periods
  arima_7d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 7
    forecast_horizon: 7
    day_of_week_adj: true
    auto_arima: true
    seasonal: false

  arima_14d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 14
    forecast_horizon: 14
    day_of_week_adj: true
    auto_arima: true
    seasonal: false

  arima_30d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 30
    day_of_week_adj: true
    auto_arima: true
    seasonal: true

  arima_60d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 60
    forecast_horizon: 30
    day_of_week_adj: true
    auto_arima: true
    seasonal: true

  # Prophet models
  prophet_7d:
    type: Prophet
    target: [close, volume]
    lookback_days: 7
    forecast_horizon: 7
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: false

  prophet_30d:
    type: Prophet
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 30
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: true

  prophet_60d:
    type: Prophet
    target: [close, volume]
    lookback_days: 60
    forecast_horizon: 30
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: true

  # Random Forest models for comparison
  random_forest_14d:
    type: RandomForest
    target: [close, volume]
    lookback_days: 14
    forecast_horizon: 7
    day_of_week_adj: true
    n_estimators: 100
    max_depth: 10
    features:
      - lag_1
      - lag_7
      - lag_14
      - day_of_week
      - rolling_mean_7
      - rolling_std_7

  random_forest_30d:
    type: RandomForest
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 14
    day_of_week_adj: true
    n_estimators: 100
    max_depth: 10
    features:
      - lag_1
      - lag_7
      - lag_14
      - lag_30
      - day_of_week
      - rolling_mean_7
      - rolling_std_7
      - rolling_mean_30
      - rolling_std_30
