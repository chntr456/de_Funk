# Temporal Model - Time and calendar dimensions
# Foundation model for all time-based analysis

model: temporal
version: 2.0
description: "Time and calendar dimensions - foundation for all time-series analysis"
tags: [time, calendar, dates, foundation, shared]

# No inheritance - temporal is foundational
depends_on: []  # No dependencies - this is a foundation model

# Component composition
components:
  schema: temporal/schema.yaml
  graph: temporal/graph.yaml
  measures: temporal/measures.yaml

# Storage configuration
storage:
  root: storage/silver/temporal
  format: parquet

# Build configuration
build:
  partitions: []
  sort_by: [date]
  optimize: true

# Metadata
metadata:
  owner: data_engineering
  domain: foundation
  sla_hours: 1
  description: |
    Temporal model provides time-based dimensions:
    - dim_calendar: Universal calendar with rich date attributes
    - Fiscal periods, holidays, trading days
    - Date hierarchies (year, quarter, month, week, day)
