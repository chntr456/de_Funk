# Forecast Model - Time series predictions
# Machine learning forecasts for price and volume

model: forecast
version: 2.0
description: "Time series forecasts for price and volume with multiple ML models"
tags: [timeseries, forecast, ml, predictions]

# Dependencies
depends_on:
  - core     # Uses dim_calendar for time-based queries
  - stocks   # Reads stock prices for training data
  - company  # Company fundamentals for enhanced predictions

# Component composition
components:
  schema: forecast/schema.yaml
  graph: forecast/graph.yaml
  measures: forecast/measures.yaml

# Storage configuration
storage:
  root: storage/silver/forecast
  format: delta

# Build configuration
build:
  partitions: [forecast_date]
  sort_by: [ticker, forecast_date, model_name]
  optimize: true

# Metadata
metadata:
  owner: data_science
  domain: analytics
  sla_hours: 6
  description: |
    Forecast model provides ML-based predictions using:
    - ARIMA: Traditional time series with various lookback periods
    - Prophet: Facebook's forecasting with seasonality
    - RandomForest: Feature-based ML predictions

# ML Model configurations
ml_models:
  # ARIMA models with different lookback periods
  arima_7d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 7
    forecast_horizon: 7
    day_of_week_adj: true
    auto_arima: true
    seasonal: false

  arima_14d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 14
    forecast_horizon: 14
    day_of_week_adj: true
    auto_arima: true
    seasonal: false

  arima_30d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 30
    day_of_week_adj: true
    auto_arima: true
    seasonal: true

  arima_60d:
    type: ARIMA
    target: [close, volume]
    lookback_days: 60
    forecast_horizon: 30
    day_of_week_adj: true
    auto_arima: true
    seasonal: true

  # Prophet models
  prophet_7d:
    type: Prophet
    target: [close, volume]
    lookback_days: 7
    forecast_horizon: 7
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: false

  prophet_30d:
    type: Prophet
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 30
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: true

  prophet_60d:
    type: Prophet
    target: [close, volume]
    lookback_days: 60
    forecast_horizon: 30
    day_of_week_adj: true
    seasonality_mode: multiplicative
    include_holidays: true

  # Random Forest models
  random_forest_14d:
    type: RandomForest
    target: [close, volume]
    lookback_days: 14
    forecast_horizon: 7
    day_of_week_adj: true
    n_estimators: 100
    max_depth: 10
    features:
      - lag_1
      - lag_7
      - lag_14
      - day_of_week
      - rolling_mean_7
      - rolling_std_7

  random_forest_30d:
    type: RandomForest
    target: [close, volume]
    lookback_days: 30
    forecast_horizon: 14
    day_of_week_adj: true
    n_estimators: 100
    max_depth: 10
    features:
      - lag_1
      - lag_7
      - lag_14
      - lag_30
      - day_of_week
      - rolling_mean_7
      - rolling_std_7
      - rolling_mean_30
      - rolling_std_30
