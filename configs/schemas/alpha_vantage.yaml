# Alpha Vantage API Response Schemas
# These define the RAW API response fields (before transformation)
# All fields are strings because Alpha Vantage returns everything as strings
#
# Usage in facets:
#   class MyFacet(AlphaVantageFacet):
#       INPUT_SCHEMA_KEY = "overview"  # References this config

# OVERVIEW endpoint - Company fundamentals
# Used by: SecuritiesReferenceFacet, CompanyReferenceFacet
overview:
  - { name: Symbol, type: string }
  - { name: AssetType, type: string }
  - { name: Name, type: string }
  - { name: Description, type: string }
  - { name: CIK, type: string }
  - { name: Exchange, type: string }
  - { name: Currency, type: string }
  - { name: Country, type: string }
  - { name: Sector, type: string }
  - { name: Industry, type: string }
  - { name: Address, type: string }
  - { name: FiscalYearEnd, type: string }
  - { name: LatestQuarter, type: string }
  - { name: MarketCapitalization, type: string }
  - { name: EBITDA, type: string }
  - { name: PERatio, type: string }
  - { name: PEGRatio, type: string }
  - { name: BookValue, type: string }
  - { name: DividendPerShare, type: string }
  - { name: DividendYield, type: string }
  - { name: EPS, type: string }
  - { name: RevenuePerShareTTM, type: string }
  - { name: ProfitMargin, type: string }
  - { name: OperatingMarginTTM, type: string }
  - { name: ReturnOnAssetsTTM, type: string }
  - { name: ReturnOnEquityTTM, type: string }
  - { name: RevenueTTM, type: string }
  - { name: GrossProfitTTM, type: string }
  - { name: DilutedEPSTTM, type: string }
  - { name: QuarterlyEarningsGrowthYOY, type: string }
  - { name: QuarterlyRevenueGrowthYOY, type: string }
  - { name: AnalystTargetPrice, type: string }
  - { name: AnalystRatingStrongBuy, type: string }
  - { name: AnalystRatingBuy, type: string }
  - { name: AnalystRatingHold, type: string }
  - { name: AnalystRatingSell, type: string }
  - { name: AnalystRatingStrongSell, type: string }
  - { name: TrailingPE, type: string }
  - { name: ForwardPE, type: string }
  - { name: PriceToSalesRatioTTM, type: string }
  - { name: PriceToBookRatio, type: string }
  - { name: EVToRevenue, type: string }
  - { name: EVToEBITDA, type: string }
  - { name: Beta, type: string }
  - { name: 52WeekHigh, type: string }
  - { name: 52WeekLow, type: string }
  - { name: 50DayMovingAverage, type: string }
  - { name: 200DayMovingAverage, type: string }
  - { name: SharesOutstanding, type: string }
  - { name: DividendDate, type: string }
  - { name: ExDividendDate, type: string }

# LISTING_STATUS endpoint - Bulk ticker listing
# Used by: AlphaVantageIngestor.fetch_listing_status
listing_status:
  - { name: symbol, type: string }
  - { name: name, type: string }
  - { name: exchange, type: string }
  - { name: assetType, type: string }
  - { name: ipoDate, type: string }
  - { name: delistingDate, type: string }
  - { name: status, type: string }

# TIME_SERIES_DAILY endpoint - Daily OHLCV prices
# Used by: SecuritiesPricesFacet
time_series_daily:
  - { name: date, type: string }
  - { name: open, type: string }
  - { name: high, type: string }
  - { name: low, type: string }
  - { name: close, type: string }
  - { name: volume, type: string }

# HISTORICAL_OPTIONS endpoint - Options chain data
# Note: This is the TRANSFORMED schema (after _transform_option)
# because this facet transforms data before creating DataFrame
historical_options:
  - { name: contract_id, type: string }
  - { name: underlying_ticker, type: string }
  - { name: trade_date, type: string }
  - { name: expiration_date, type: string }
  - { name: strike_price, type: double }
  - { name: option_type, type: string }
  - { name: last_price, type: double }
  - { name: mark_price, type: double }
  - { name: bid_price, type: double }
  - { name: ask_price, type: double }
  - { name: bid_size, type: long }
  - { name: ask_size, type: long }
  - { name: bid_ask_spread, type: double }
  - { name: volume, type: long }
  - { name: open_interest, type: long }
  - { name: implied_volatility, type: double }
  - { name: delta, type: double }
  - { name: gamma, type: double }
  - { name: theta, type: double }
  - { name: vega, type: double }
  - { name: rho, type: double }
  - { name: days_to_expiration, type: int }
  - { name: moneyness, type: double }
  - { name: in_the_money, type: boolean }
  - { name: ingestion_timestamp, type: timestamp }
  - { name: snapshot_date, type: date }

